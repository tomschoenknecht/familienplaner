<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Familienplaner</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  * { box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; }

  /* ── Mobile Fixes ─────────────────────────────────────── */
  /* Navigation scrollbar verstecken */
  nav { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }

  /* Hauptinhalt Padding */
  .main-content { padding: 20px 16px; max-width: 1200px; margin: 0 auto; }
  @media (min-width: 640px) { .main-content { padding: 28px 24px; } }

  /* Wochenplan: auf Mobil Tageskarten untereinander */
  .wochenplan-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 640px) { .wochenplan-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { .wochenplan-grid { grid-template-columns: repeat(4, 1fr); } }

  /* Wochenplan KW-Zeile */
  .kw-zeile { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .kw-text { font-size: 13px; font-weight: 700; color: #7c5c42; text-align: center; flex: 1; }
  @media (min-width: 640px) { .kw-text { font-size: 15px; } }

  /* Button-Zeile Wrap */
  .btn-zeile { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .btn-zeile button { flex: 1 1 auto; min-width: 140px; }

  /* Vorlieben: 2-Spalten-Grid auf Mobil zu 1 Spalte */
  .vorlieben-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 24px; }
  @media (min-width: 640px) { .vorlieben-grid { grid-template-columns: 1fr 1fr; gap: 20px; } }

  /* Rezepte: Karten-Grid */
  .rezepte-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 500px) { .rezepte-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { .rezepte-grid { grid-template-columns: repeat(3, 1fr); } }

  /* Einkaufsliste: Grid auf Mobil 1 Spalte */
  .einkauf-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 500px) { .einkauf-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { .einkauf-grid { grid-template-columns: repeat(3, 1fr); } }

  /* Übersicht Vorlieben */
  .uebersicht-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (min-width: 640px) { .uebersicht-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; } }

  /* Header: kleiner auf Mobil */
  @media (max-width: 639px) {
    .header-titel { font-size: 22px !important; }
    .header-namen { font-size: 12px !important; }
    .sync-btn { font-size: 11px !important; padding: 5px 10px !important; }
  }

  /* Kalender: scrollbar horizontal */
  .kalender-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ── Kühlschrank-Wochenplan ───────────────────────────────────────── */
  .kuehlschrank {
    position: relative; width: 100%; border-radius: 10px 10px 14px 14px;
    background-image: var(--fridge-img);
    background-size: 100% 100%; background-position: center;
    overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  }
  .ks-griff {
    position: absolute; top: 7%; bottom: 7%; right: 1.4%; width: 11px; border-radius: 7px;
    background: linear-gradient(90deg,#6b7176,#c9d0d4 35%,#f4f8fa 50%,#aeb6bb 65%,#5b6166 90%);
    box-shadow: 0 3px 7px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.8); z-index: 4;
  }
  .ks-spruch {
    position: absolute; left: 50%; top: 8px; transform: translateX(-50%) rotate(-1.5deg);
    z-index: 5; background: #fffef2; padding: 4px 16px; font-family: 'Caveat', cursive;
    font-size: 17px; color: #6b5a2c; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    border: 0.5px solid rgba(0,0,0,0.08); max-width: 70%; text-align: center;
  }
  .ks-spruch-tape { position:absolute; top:-6px; left:50%; transform:translateX(-50%) rotate(3deg);
    width:38px; height:14px; background:rgba(255,255,255,0.5); border:0.5px solid rgba(255,255,255,0.6); }
  .ks-zettelgrid {
    position: relative; z-index: 2; display: flex; gap: 0.4%;
    padding: 84px 1.6% 5% 1.6%; align-items: stretch;
  }
  .ks-tagspalte {
    flex: 1 1 0; min-width: 0; display: grid;
    grid-template-rows: 116px 100px 100px 100px; row-gap: 8px;
  }
  .ks-zettel-platzhalter { width: 100%; }
  .ks-zettel-wrap { position: relative; }
  .ks-zettel-wrap::before {
    content: ""; position: absolute; width: 34px; height: 15px; z-index: 5;
    top: -6px; left: var(--tape-left, 40%);
    transform: translateX(-50%) rotate(var(--tape-rot, 0deg));
    background: rgba(255,255,255,0.42);
    box-shadow: inset 0 0 6px rgba(255,255,255,0.35), 0 1px 2px rgba(0,0,0,0.10);
    border-left: 1px solid rgba(255,255,255,0.25); border-right: 1px solid rgba(255,255,255,0.25);
    pointer-events: none;
  }
  .ks-zettel {
    position: relative; cursor: pointer;
    -webkit-mask: var(--tex-img) center/100% 100% no-repeat; mask: var(--tex-img) center/100% 100% no-repeat;
    filter: drop-shadow(1px 2px 2.5px rgba(0,0,0,0.22));
    padding: 9px 10px 13px;
    transition: transform 0.12s ease, filter 0.12s ease;
  }
  .ks-zettel:hover {
    filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.30));
    z-index: 6;
  }
  .ks-zettel .ks-color { position:absolute; inset:0; z-index:0; }
  .ks-zettel .ks-tex { position:absolute; inset:0; z-index:1; mix-blend-mode:multiply; opacity:0.55;
    background: var(--tex-img) center/100% 100% no-repeat; pointer-events:none; }
  .ks-zettel-inhalt { position: relative; z-index: 2; }
  .ks-tagkopf { border-bottom: 1px solid rgba(0,0,0,0.18); padding-bottom: 2px; margin-bottom: 4px; }
  .ks-tag { font-family:'Caveat',cursive; font-weight:700; font-size:21px; line-height:1; }
  .ks-datum { font-family:'Caveat',cursive; font-size:15px; opacity:1; margin-left:5px; font-weight:700; }
  .ks-mahl-label { font-family:'Caveat',cursive; font-size:15px; font-weight:700; color:#6b6760; line-height:1; }
  .ks-mahl-name { font-family:'Caveat',cursive; font-size:17px; color:#2b2824; font-weight:600; line-height:1.1; min-height:17px; }
  .ks-praesenz { display:flex; gap:4px; margin-top:5px; align-items:center; flex-wrap:wrap; }
  .ks-init { width:17px; height:17px; border-radius:50%; cursor:pointer; font-size:11px; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center; font-family:system-ui,sans-serif;
    line-height:1; user-select:none; }
  .ks-thumbs { display:inline-flex; gap:5px; align-items:center; }
  .ks-thumb { font-family:'Caveat',cursive; font-size:13px; line-height:1; opacity:0.9; }
  .ks-legende { display:flex; flex-wrap:wrap; gap:16px;
    padding: 2px 4px 12px; justify-content:center; }
  .ks-legende-eintrag { display:inline-flex; align-items:center; gap:5px;
    font-family:system-ui,sans-serif; font-size:12px; font-weight:600; color:#5a544c; }
  .ks-init-legende { cursor:default; }
  /* Mobil: pro Tag eine Spalte, horizontal scrollbar */
  @media (max-width: 760px) {
    .ks-zettelgrid { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-top: 64px; padding-bottom: 16px; }
    .ks-tagspalte { flex: 0 0 165px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

// Bild zu einer Mahlzeit/Rezept: zuerst exaktes Rezept-Bild, sonst vorsichtiger Kategorie-Fallback, sonst KEIN Bild.
function bildFuerMahlzeit(mahlzeit) {
  if (mahlzeit.id && REZEPT_BILDER[mahlzeit.id]) return REZEPT_BILDER[mahlzeit.id];
  if (mahlzeit.kategorie && KATEGORIE_BILDER[mahlzeit.kategorie]) return KATEGORIE_BILDER[mahlzeit.kategorie];
  return null;
}
function bildFuerKategorie(kategorie) {
  return KATEGORIE_BILDER[kategorie] || null;
}

  const z = name.toLowerCase();
  for (const [kat, liste] of Object.entries(SUPERMARKT_KATEGORIEN)) {
    if (liste.some(l => l.toLowerCase() === z)) return kat;
  }
  // Fallback: vorsichtiger Teilstring-Abgleich (nur wenn eindeutig)
  for (const [kat, liste] of Object.entries(SUPERMARKT_KATEGORIEN)) {
    if (liste.some(l => z.includes(l.toLowerCase()) || l.toLowerCase().includes(z))) return kat;
  }
  return "Sonstiges";
}

// Supabase-Verbindung (modulweit, damit save() überall pushen kann)
let _sb = null;            // Supabase-Client
let _household = null;     // Haushalts-Code
let _channel = null;       // Realtime-Channel
let _libPromise = null;    // Lade-Promise der Bibliothek
const DATEN_KEYS = ["rezepte", "vorlieben", "kalender", "wochenplan", "verlauf", "avatarFarben", "familie"];

// Migriert Rezepte mit altem/unvollständigem Zutaten-Format (Strings oder Objekte ohne Einheit/Menge)
// in das aktuelle Objekt-Format mit Mengen & Einheiten. Wird überall angewendet, wo Rezepte gesetzt werden
// (initial, lokal geladen UND aus der Cloud), damit alte Cloud-Daten die App nicht mehr verfälschen.
function migriereRezepte(liste) {
  if (!Array.isArray(liste)) return STARTER_REZEPTE;

  const aktuelleById = {};
  [...STARTER_REZEPTE, ...ABENTEUER_REZEPTE].forEach(r => { aktuelleById[r.id] = r; });

  // Bestehende Rezepte: bekannte IDs immer mit aktuellen Daten aus STARTER_REZEPTE ersetzen
  // (so werden fehlende Zutaten, Links etc. automatisch ergänzt), eigene Rezepte bleiben unverändert
  const migriert = liste.map(r => {
    if (!r) return r;
    // Bekanntes Rezept (r\d+ oder b\d+): immer aktuelle Version nehmen, Bewertungen beibehalten
    if (aktuelleById[r.id]) {
      return { ...aktuelleById[r.id], bewertungen: r.bewertungen || {} };
    }
    // Eigenes Rezept: Zutaten-Format migrieren falls nötig
    if (!Array.isArray(r.zutaten)) return r;
    const hatAlteZutaten = r.zutaten.some(z => typeof z === "string" || !z?.einheit || z?.menge == null);
    if (!hatAlteZutaten) return r;
    return { ...r, zutaten: r.zutaten.map(z => (typeof z === "string") ? { name: z, menge: 1, einheit: "Portion" } : { name: z.name, menge: z.menge ?? 1, einheit: z.einheit || "Portion" }) };
  });

  // Neue Rezepte ergänzen, die noch nicht in der gespeicherten Liste sind
  const vorhandeneIds = new Set(migriert.map(r => r.id));
  const fehlende = STARTER_REZEPTE.filter(r => !vorhandeneIds.has(r.id));
  if (fehlende.length > 0) {
    return [...migriert, ...fehlende];
  }

  return migriert;
}

function loadSupabaseLib() {
  if (typeof window !== "undefined" && window.supabase) return Promise.resolve(window.supabase);
  if (_libPromise) return _libPromise;
  _libPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    s.onload = () => resolve(window.supabase);
    s.onerror = () => reject(new Error("Supabase-Bibliothek konnte nicht geladen werden"));
    document.head.appendChild(s);
  });
  return _libPromise;
}

async function connectSync({ url, key, household }, onRemote) {
  const lib = await loadSupabaseLib();
  _sb = lib.createClient(url, key);
  _household = household;
  // Realtime-Abo für diesen Haushalt
  _channel = _sb
    .channel("familienplaner-" + household)
    .on("postgres_changes",
      { event: "*", schema: "public", table: "familienplaner_data", filter: `household=eq.${household}` },
      payload => {
        const row = payload.new;
        if (row && onRemote) onRemote(row.key, row.value);
      })
    .subscribe();
  return _sb;
}

function disconnectSync() {
  try { if (_sb && _channel) _sb.removeChannel(_channel); } catch {}
  _sb = null; _household = null; _channel = null;
}

async function pullAll() {
  if (!_sb) return null;
  const { data, error } = await _sb.from("familienplaner_data").select("key,value").eq("household", _household);
  if (error) throw error;
  const out = {};
  (data || []).forEach(row => { out[row.key] = row.value; });
  return out;
}

async function pushOne(key, value) {
  if (!_sb || !_household) return;
  await _sb.from("familienplaner_data")
    .upsert({ household: _household, key, value, updated_at: new Date().toISOString() }, { onConflict: "household,key" });
}

// save() schreibt immer lokal und – falls verbunden – in die Cloud
const _zuletztGesendet = {}; // key -> timestamp, um eigene Echo-Updates kurz zu ignorieren
const save = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  if (DATEN_KEYS.includes(key)) {
    _zuletztGesendet[key] = Date.now();
    pushOne(key, val).catch(() => {});
  }
};

// Bild verkleinern & als Base64 zurückgeben (begrenzt Größe für API & Speicher)
function bildVerkleinern(file, maxKante = 1280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxKante) { height = Math.round(height * maxKante / width); width = maxKante; }
        else if (height > maxKante) { width = Math.round(width * maxKante / height); height = maxKante; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
        resolve({ media_type: "image/jpeg", base64: dataUrl.split(",")[1] });
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Foto an Claude schicken und strukturiertes Rezept zurückbekommen
async function rezeptAusFoto(file) {
  const key = getApiKey();
  if (!key) throw new Error("KEIN_KEY");
  const { media_type, base64 } = await bildVerkleinern(file);
  const prompt = `Du bist ein Assistent, der aus einem Foto eines Rezepts (Kochbuch, Zettel, Verpackung o.ä.) ein strukturiertes Rezept extrahiert.
Antworte AUSSCHLIESSLICH mit einem gültigen JSON-Objekt, ohne Markdown, ohne Erklärung, in diesem Format:
{
  "name": "Name des Gerichts",
  "kategorie": "z.B. Pasta, Suppe, Auflauf, Fleisch, Fisch, Dessert",
  "dauer": Zahl in Minuten (0 wenn unbekannt),
  "zutaten": [{"name": "Zutat", "menge": Zahl, "einheit": "g|kg|ml|l|EL|TL|Stück|Bund|Zehe|Prise|Scheibe|Päckchen|Blatt|Stange"}],
  "tags": ["z.B. Kinder mögen's, Vegetarisch, Schnell"],
  "beschreibung": "Kurze Zubereitungsbeschreibung in 1-3 Sätzen"
}
Regeln: Mengen immer auf 4 Personen umrechnen, wenn im Rezept eine andere Portionszahl angegeben ist. Wenn eine Menge unklar ist, schätze sinnvoll. Verwende deutsche Zutatennamen. Wenn das Bild kein Rezept zeigt, gib {"fehler": "Kein Rezept erkannt"} zurück.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type, data: base64 } },
        { type: "text", text: prompt },
      ]}],
    }),
  });
  if (!res.ok) {
    const t = await res.text().catch(() => "");
    if (res.status === 401) throw new Error("KEY_UNGUELTIG");
    throw new Error("API_FEHLER: " + res.status + " " + t.slice(0, 200));
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("").trim();
  const clean = text.replace(/^```json\s*/i, "").replace(/```$/,"").trim();
  let parsed;
  try { parsed = JSON.parse(clean); } catch { throw new Error("PARSE_FEHLER"); }
  if (parsed.fehler) throw new Error("KEIN_REZEPT");
  return parsed;
}

function getWeekDates(offset = 0) {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  return WOCHENTAGE.map((_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
  });
}

function scoreRezept(rezept, vorlieben, anwesend) {
  let score = 0;
  anwesend.forEach(person => {
    const v = vorlieben[person] || { mag: [], magNicht: [] };
    if (v.mag.some(m => rezept.tags?.includes(m) || rezept.kategorie?.includes(m))) score += 2;
    if (v.magNicht.some(m => rezept.tags?.includes(m) || rezept.kategorie?.includes(m))) score -= 3;
  });

  // Bewertungs-Score: Durchschnitt aller Stimmen (fair, unabhängig von Familiengröße)
  // 👍 = +1, 👎 = -1; Durchschnitt × 4 auf den Score addieren (starker aber nicht dominierender Einfluss)
  const stimmen = Object.values(rezept.bewertungen || {}).filter(v => v !== undefined);
  if (stimmen.length > 0) {
    const durchschnitt = stimmen.reduce((a, b) => a + b, 0) / stimmen.length;
    score += durchschnitt * 4;
  }

  return score;
}

  "Fruktose":    ["apfel", "apfelmus", "birne", "mango", "traube", "honig", "fruktose", "agavensirup", "zwiebeln", "lauch", "ketchup"],
  "Ei":          ["ei", "eier"],

  "Soja":        ["soja", "tofu", "edamame", "sojasoße", "sojamilch"],
  "Schalentiere":["garnelen", "shrimps", "schalentiere", "hummer", "krebs", "muschel"],
};

// Zutaten/Tags die Fleisch/Fisch signalisieren (für vegetarisch/vegan)
const FLEISCH_ZUTATEN = ["hackfleisch", "hähnchen", "hähnchenbrust", "hähnchenfleisch", "rindfleisch", "kalbsschnitzel", "speck", "salami", "würstchen", "wurst", "schinken", "schnitzel", "steak"];
const FISCH_ZUTATEN   = ["fisch", "lachs", "thunfisch", "garnelen", "shrimps", "kabeljau", "fischstäbchen", "makrele"];
const TIERISCH_ZUTATEN = [...FLEISCH_ZUTATEN, ...FISCH_ZUTATEN, "milch", "butter", "käse", "sahne", "joghurt", "parmesan", "mozzarella", "cheddar", "ricotta", "feta", "gouda", "frischkäse", "hüttenkäse", "eier", "ei", "honig", "béchamelsauce"];

function rezeptKompatibel(rezept, vorlieben, anwesend) {
  const zutatenNamen = (rezept.zutaten || []).map(z =>
    (typeof z === "string" ? z : z.name || "").toLowerCase()
  );
  const tags = (rezept.tags || []).map(t => t.toLowerCase());
  const kategorie = (rezept.kategorie || "").toLowerCase();

  for (const person of anwesend) {
    const v = vorlieben[person] || {};
    const unvertr = v.unvertraeglichkeiten || [];
    const ernaehrung = v.ernaehrung || "Alles";

    // Unverträglichkeiten prüfen
    for (const u of unvertr) {
      const schlüssel = UNVERTRAEGLICHKEIT_ZUTATEN[u] || [];
      const hat = zutatenNamen.some(z => schlüssel.some(s => z.includes(s)));
      if (hat) return false;
    }

    // Ernährungsweise prüfen
    if (ernaehrung === "Vegetarisch") {
      const hatFleischOderFisch = zutatenNamen.some(z => [...FLEISCH_ZUTATEN, ...FISCH_ZUTATEN].some(s => z.includes(s)));
      if (hatFleischOderFisch) return false;
    }
    if (ernaehrung === "Vegan") {
      const hatTierisch = zutatenNamen.some(z => TIERISCH_ZUTATEN.some(s => z.includes(s)));
      if (hatTierisch) return false;
    }
  }
  return true;
}

// Bewertungssumme einer Mahlzeit (👍=+1, 👎=−1) über alle Personen
function ksBewertung(mahlzeit) {
  if (!mahlzeit || !mahlzeit.bewertungen) return { up: 0, down: 0 };
  let up = 0, down = 0;
  Object.values(mahlzeit.bewertungen).forEach(v => { if (v === 1) up++; else if (v === -1) down++; });
  return { up, down };
}

// Fester, aber „zufällig" wirkender Versatz pro Zettel (deterministisch aus Tag+Mahlzeit)
function ksVersatz(tagIdx, mahlIdx) {
  const seed = (tagIdx * 7 + mahlIdx * 13 + 5);
  const r = (n) => {
    const x = Math.sin(seed * n) * 10000;
    return x - Math.floor(x);
  };
  // Streifen-Neigung: unregelmäßig, mal gerade, mal links/rechts geneigt
  const tapeRaw = (r(5.9) - 0.5) * 56;          // −28°..+28°
  const tapeRot = Math.abs(tapeRaw) < 5 ? 0 : tapeRaw;  // kleine Werte = gerade
  return {
    rot: (r(1.3) - 0.5) * 13,        // −6.5°..+6.5°
    dx: (r(2.7) - 0.5) * 22,         // −11..+11 px
    dy: (r(4.1) - 0.5) * 26,         // −13..+13 px
    tapeRot,                          // Neigung des Klebestreifens
    tapeLeft: 18 + r(8.3) * 52,       // horizontale Position in % (18..70)
  };
}

function WochenplanView({ wochenplan, setWochenplan, rezepte, vorlieben, kalender, setKalender, verlauf, setVerlauf }) {
  const [weekOffset, setWeekOffset] = useState(1);
  const [generating, setGenerating] = useState(false);
  const [editSlot, setEditSlot] = useState(null);
  const [einkaufsliste, setEinkaufsliste] = useState(null);

  const weekDates = getWeekDates(weekOffset);
  const weekKey = weekDates[0];
  const plan = wochenplan[weekKey] || {};

  const anwesendAn = (tag, mahlzeit) => {
    const datum = weekDates[WOCHENTAGE.indexOf(tag)];
    return FAMILIE.filter(p => {
      const abw = kalender[p] || [];
      if (abw.includes(`${datum}|ganztags`)) return false;
      if (mahlzeit && abw.includes(`${datum}|${mahlzeit}`)) return false;
      return true;
    });
  };

  const togglePersonAnwesenheit = (person, datum, mahlzeit) => {
    const key = `${datum}|${mahlzeit}`;
    const ganztagsKey = `${datum}|ganztags`;
    const bisher = kalender[person] || [];
    let updated;
    if (bisher.includes(ganztagsKey)) {
      // War ganztags abwesend -> jetzt für diese Mahlzeit wieder anwesend, Rest des Tages bleibt abwesend
      updated = bisher.filter(k => k !== ganztagsKey);
      MAHLZEITEN.forEach(m => { if (m !== mahlzeit) updated.push(`${datum}|${m}`); });
    } else if (bisher.includes(key)) {
      updated = bisher.filter(k => k !== key);
    } else {
      updated = [...bisher, key];
    }
    const n = { ...kalender, [person]: updated };
    setKalender(n); save("kalender", n);
  };

  const generiereWochenplan = async () => {
    setGenerating(true);
    await new Promise(r => setTimeout(r, 900));
    const alleRezepte = [...rezepte, ...ABENTEUER_REZEPTE];
    const neuerPlan = {};
    const genutzt = new Set();

    WOCHENTAGE.forEach((tag, ti) => {
      neuerPlan[tag] = {};
      const ganzerTagLeer = anwesendAn(tag, null).length === 0;
      if (ganzerTagLeer) { neuerPlan[tag]["Abendessen"] = null; return; }

      MAHLZEITEN.forEach(m => {
        const anwesend = anwesendAn(tag, m);
        if (anwesend.length === 0) { neuerPlan[tag][m] = null; return; }

        if (m === "Frühstück") {
          const optionen = ["Müsli mit Früchten & Joghurt", "Toast mit Aufschnitt & Käse", "Joghurt mit Granola & Beeren", "Rührei & Toast", "Haferbrei mit Banane", "Brötchen mit Marmelade", "Pfannkuchen"];
          neuerPlan[tag][m] = { name: optionen[ti % optionen.length], typ: "einfach" };
          return;
        }
        if (m === "Brotbox") {
          if ([5, 6].includes(ti)) { neuerPlan[tag][m] = null; return; } // Keine Brotbox am Wochenende
          // Brotbox-Rezepte aus der Bibliothek bevorzugen, sonst feste Optionen
          const brotboxRezepte = alleRezepte.filter(r => r.kategorie === "Brotbox" && rezeptKompatibel(r, vorlieben, anwesend));
          if (brotboxRezepte.length > 0) {
            const gewählt = brotboxRezepte[Math.floor(Math.random() * brotboxRezepte.length)];
            neuerPlan[tag][m] = { ...gewählt, typ: "brotbox" };
            return;
          }
          const brotboxOptionen = [
            "Käsebrot & Apfel", "Laugenbrezel & Joghurt", "Sandwich mit Schinken",
            "Wraps mit Gemüse & Frischkäse", "Brot mit Frischkäse & Gurke",
            "Mini-Croissant & Trauben", "Brot mit Hüttenkäse & Paprika",
            "Brot mit Erdnussbutter & Banane", "Vollkornbrot mit Käse & Tomate",
            "Körner-Brötchen mit Aufschnitt", "Toast mit Avocado & Ei",
            "Bagel mit Frischkäse & Lachs", "Knäckebrot mit Hummus",
          ];
          neuerPlan[tag][m] = { name: brotboxOptionen[Math.floor(Math.random() * brotboxOptionen.length)], typ: "brotbox" };
          return;
        }
        if (m === "Mittagessen" && [0,1,2,3,4].includes(ti)) {
          neuerPlan[tag][m] = { name: "Schulessen / Reste", typ: "info" };
          return;
        }
        const verfügbar = alleRezepte.filter(r =>
          !genutzt.has(r.id) && rezeptKompatibel(r, vorlieben, anwesend)
        );
        // Fallback: wenn alle Rezepte inkompatibel sind, alle erlauben (lieber was als nichts)
        const pool = verfügbar.length > 0 ? verfügbar : alleRezepte.filter(r => !genutzt.has(r.id));
        const bewertet = pool.map(r => ({ r, score: scoreRezept(r, vorlieben, anwesend) + (Math.random() * 2 - 1) }));
        bewertet.sort((a, b) => b.score - a.score);

        // Gelegentlich Abenteuer einstreuen (ca. 20%)
        let gewählt;
        if (Math.random() < 0.2) {
          const abent = ABENTEUER_REZEPTE.filter(r => !genutzt.has(r.id) && rezeptKompatibel(r, vorlieben, anwesend));
          gewählt = abent[Math.floor(Math.random() * abent.length)] || bewertet[0]?.r;
        } else {
          gewählt = bewertet[0]?.r;
        }

        if (gewählt) {
          genutzt.add(gewählt.id);
          neuerPlan[tag][m] = { ...gewählt };
        }
      });
    });

    setWochenplan(prev => { const n = { ...prev, [weekKey]: neuerPlan }; save("wochenplan", n); return n; });
    setGenerating(false);
  };

  const berechneEinkaufsliste = () => {
    const aktuelleById = {};
    const aktuelleByName = {};
    const zutatReferenz = {}; // Zutatname (lowercase) -> { einheit, menge } aus aktuellen Rezepten
    [...rezepte, ...ABENTEUER_REZEPTE].forEach(r => {
      aktuelleById[r.id] = r;
      aktuelleByName[r.name.toLowerCase()] = r;
      (r.zutaten || []).forEach(z => {
        if (z && typeof z === "object" && z.name && z.einheit && !zutatReferenz[z.name.toLowerCase()]) {
          zutatReferenz[z.name.toLowerCase()] = { einheit: z.einheit, menge: z.menge ?? 1 };
        }
      });
    });

    const zutatenMap = {}; // key: "name|einheit" -> { name, einheit, menge }
    Object.entries(plan).forEach(([tag, mahlzeitenDesTages]) => {
      Object.entries(mahlzeitenDesTages).forEach(([m, mahlzeit]) => {
        let zutatenListe = mahlzeit?.zutaten;
        // Immer die aktuellen Rezept-Zutaten bevorzugen, wenn die Mahlzeit einem bekannten Rezept entspricht
        // (per ID oder Name). So sind Mengen/Einheiten garantiert aktuell, auch bei alten gespeicherten Plänen.
        const passendesRezept = (mahlzeit?.id && aktuelleById[mahlzeit.id])
          || (mahlzeit?.name && aktuelleByName[mahlzeit.name.toLowerCase()]);
        if (passendesRezept) {
          zutatenListe = passendesRezept.zutaten;
        }
        if (zutatenListe) {
          // Rezept-Mengen sind für 4 Personen kalkuliert -> auf tatsächliche Anwesenheit skalieren
          const anwesendCount = anwesendAn(tag, m).length;
          const faktor = anwesendCount / FAMILIE.length;
          if (faktor <= 0) return;
          zutatenListe.forEach(z => {
            const name = (typeof z === "string") ? z.trim() : (z.name || "").trim();
            if (!name) return;
            // Einheit/Menge bestimmen; fehlt die Einheit, aus der Zutaten-Referenz der aktuellen Rezepte ergänzen
            const ref = zutatReferenz[name.toLowerCase()];
            let einheit = (typeof z === "string") ? null : z.einheit;
            let basisMenge = (typeof z === "string") ? null : z.menge;
            if (!einheit && ref) { einheit = ref.einheit; if (basisMenge == null) basisMenge = ref.menge; }
            einheit = einheit || "Portion";
            basisMenge = (basisMenge == null) ? 1 : basisMenge;
            const key = `${name}|${einheit}`;
            if (!zutatenMap[key]) zutatenMap[key] = { name, einheit, menge: 0 };
            zutatenMap[key].menge += basisMenge * faktor;
          });
        }
      });
    });
    // Mengen sinnvoll runden
    Object.values(zutatenMap).forEach(item => {
      if (item.einheit === "g" || item.einheit === "ml") {
        item.menge = Math.round(item.menge / 5) * 5; // auf 5er runden
      } else {
        item.menge = Math.round(item.menge * 4) / 4; // auf Viertel runden (z.B. 0.25 Zwiebel)
        if (item.menge < 0.25 && item.menge > 0) item.menge = 0.25;
      }
    });
    // Bereinigung: veraltete "Portion"-Einträge entfernen, wenn für dieselbe Zutat
    // bereits ein Eintrag mit einer "echten" Einheit (g, ml, Stück, ...) existiert.
    Object.keys(zutatenMap).forEach(key => {
      const item = zutatenMap[key];
      if (item.einheit !== "Portion") return;
      const hatEchteEinheit = Object.values(zutatenMap).some(
        other => other !== item && other.name.toLowerCase() === item.name.toLowerCase() && other.einheit !== "Portion"
      );
      if (hatEchteEinheit) delete zutatenMap[key];
    });
    // Kategorisieren
    const nachKategorie = {};
    Object.values(zutatenMap).forEach(({ name, einheit, menge }) => {
      if (menge <= 0) return;
      const kat = kategorieVonZutat(name);
      if (!nachKategorie[kat]) nachKategorie[kat] = [];
      nachKategorie[kat].push({ zutat: name, menge, einheit, abgehakt: false, id: genId() });
    });
    // Innerhalb jeder Kategorie alphabetisch sortieren
    Object.values(nachKategorie).forEach(liste => liste.sort((a, b) => a.zutat.localeCompare(b.zutat, "de")));
    return nachKategorie;
  };

  const generiereEinkaufsliste = () => {
    setEinkaufsliste(berechneEinkaufsliste());
  };

  const toggleAbhaken = (kat, id) => {
    setEinkaufsliste(prev => ({
      ...prev,
      [kat]: prev[kat].map(item => item.id === id ? { ...item, abgehakt: !item.abgehakt } : item),
    }));
  };

  const fuegeEinkaufslisteItemHinzu = (kat, text) => {
    setEinkaufsliste(prev => ({
      ...prev,
      [kat]: [...(prev[kat] || []), { zutat: text, menge: null, einheit: null, abgehakt: false, id: genId() }],
    }));
  };

  const entferneEinkaufslisteItem = (kat, id) => {
    setEinkaufsliste(prev => ({
      ...prev,
      [kat]: (prev[kat] || []).filter(item => item.id !== id),
    }));
  };

  const speichereWoche = () => {
    const eintrag = { woche: weekKey, plan: plan, datum: new Date().toISOString() };
    const neuer = [eintrag, ...(verlauf || []).filter(v => v.woche !== weekKey)].slice(0, 12);
    setVerlauf(neuer);
    save("verlauf", neuer);
    alert("Wochenplan gespeichert!");
  };

  const druckeWochenplan = () => {
    const mahlzeitFarbe = { "Frühstück": "#e8a45c", "Brotbox": "#7a9b6e", "Mittagessen": "#d97757", "Abendessen": "#b3654a" };

    const tagesKarteHtml = (tag, i) => {
      const datum = weekDates[i];
      const mahlzeitenHtml = MAHLZEITEN.map(m => {
        const mz = plan[tag]?.[m];
        return `
          <div style="padding:7px 0; border-bottom:1px dashed #ecd9bf;">
            <div style="display:flex; align-items:center; gap:5px; margin-bottom:2px;">
              <span style="width:7px; height:7px; border-radius:50%; background:${mahlzeitFarbe[m]}; display:inline-block; flex-shrink:0;"></span>
              <span style="font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:${mahlzeitFarbe[m]};">${m}</span>
            </div>
            ${mz ? `
              <div style="font-size:12px; font-weight:700; color:#3b2412; line-height:1.3; padding-left:12px;">${mz.name}</div>
              ${mz.abenteuer ? `<div style="font-size:9px; color:#c2410c; font-weight:700; padding-left:12px; margin-top:1px;">${mz.abenteuer}</div>` : ""}
              ${mz.dauer ? `<div style="font-size:9px; color:#b08968; padding-left:12px; margin-top:1px;">${mz.dauer} Min</div>` : ""}
            ` : `<div style="font-size:11px; color:#d9c4a8; padding-left:12px; font-style:italic;">–</div>`}
          </div>`;
      }).join("");

      return `
        <div style="break-inside:avoid; border-radius:10px; overflow:hidden; border:1px solid #ecd9bf; background:#fffcf8;">
          <div style="background:linear-gradient(135deg,#c2410c,#d97757); padding:8px 10px;">
            <div style="font-size:13px; font-weight:800; color:#fff;">${tag}</div>
            <div style="font-size:10px; color:#fde6d9; font-weight:600;">${datum}</div>
          </div>
          <div style="padding:8px 10px 2px;">${mahlzeitenHtml}</div>
        </div>`;
    };

    const tageHtml = WOCHENTAGE.map((tag, i) => tagesKarteHtml(tag, i)).join("");

    const einkaufsliste = berechneEinkaufsliste();
    const katReihenfolge = Object.keys(SUPERMARKT_KATEGORIEN);
    const einkaufsKatHtml = katReihenfolge.map(kat => {
      const items = einkaufsliste[kat] || [];
      if (items.length === 0) return "";
      return `
        <div style="break-inside:avoid; margin-bottom:12px;">
          <div style="font-size:12px; font-weight:800; color:#a05a2c; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:5px; border-bottom:2px solid #ecd9bf; padding-bottom:4px;">${kat}</div>
          ${items.map(item => `
            <div style="display:flex; align-items:center; gap:7px; padding:4px 0; font-size:12.5px; color:#3b2412; border-bottom:1px solid #f7efe5;">
              <span style="width:12px; height:12px; border:1.5px solid #c2a880; border-radius:3px; display:inline-block; flex-shrink:0;"></span>
              <span style="flex:1;">${item.zutat}</span>
              <span style="color:#a05a2c; font-weight:700; font-size:11px;">${item.menge} ${item.einheit}</span>
            </div>
          `).join("")}
        </div>`;
    }).join("");

    const html = `
      <div style="page:wochenplanseite;">
        <div style="text-align:center; margin-bottom:18px;">
          <h1 style="font-size:27px; font-weight:800; color:#3b2412; margin:0;">Unser Wochenplan</h1>
          <div style="font-size:13px; color:#a05a2c; margin-top:3px; font-weight:600;">${weekDates[0]} – ${weekDates[6]}</div>
        </div>
        <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px;">
          ${tageHtml}
        </div>
        <div style="display:flex; justify-content:center; gap:18px; margin-top:16px; flex-wrap:wrap;">
          ${MAHLZEITEN.map(m => `
            <div style="display:flex; align-items:center; gap:5px;">
              <span style="width:8px; height:8px; border-radius:50%; background:${mahlzeitFarbe[m]}; display:inline-block;"></span>
              <span style="font-size:10px; color:#7c5c42; font-weight:600;">${m}</span>
            </div>
          `).join("")}
        </div>
        <div style="text-align:center; margin-top:14px; font-size:11px; color:#cbb89c;">Familienküche</div>
      </div>

      <div style="page:einkaufslisteseite; break-before:page;">
        <div style="text-align:center; margin-bottom:24px;">
          <h1 style="font-size:26px; font-weight:800; color:#3b2412; margin:0;">Einkaufsliste</h1>
          <div style="font-size:13px; color:#a05a2c; margin-top:4px; font-weight:600;">KW ab ${weekDates[0]}</div>
        </div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:18px;">
          ${einkaufsKatHtml}
        </div>
        <div style="text-align:center; margin-top:20px; font-size:11px; color:#cbb89c;">Familienküche</div>
      </div>
    `;
    const zusatzRegeln = `
      @page wochenplanseite { size: A4 landscape; margin: 9mm; }
      @page einkaufslisteseite { size: A4 portrait; margin: 9mm; }
    `;
    druckeHtml(`Wochenplan ${weekDates[0]}`, html, "A4 landscape", zusatzRegeln);
  };

  return (
    <div>
      {/* Header-Leiste */}
      <div className="kw-zeile">
        <button onClick={() => setWeekOffset(w => w - 1)} style={{ ...btnStyle("#a05a2c"), padding: "8px 14px", fontSize: 13, flexShrink: 0 }}>← Vor.</button>
        <div className="kw-text">
          {weekDates[0]} – {weekDates[6]}
          {weekOffset === 1 ? <><br/><span style={{ fontSize: 11, fontWeight: 600, color: "#c2410c" }}>Aktuelle Woche</span></> : ""}
        </div>
        <button onClick={() => setWeekOffset(w => w + 1)} style={{ ...btnStyle("#a05a2c"), padding: "8px 14px", fontSize: 13, flexShrink: 0 }}>Nächste →</button>
      </div>

      <div className="btn-zeile">
        <button onClick={generiereWochenplan} disabled={generating} style={{ ...btnStyle("#c2410c"), fontSize: 14, padding: "10px 18px" }}>
          {generating ? "Plane…" : "Wochenplan generieren"}
        </button>
        {Object.keys(plan).length > 0 && <>
          <button onClick={generiereEinkaufsliste} style={btnStyle("#4d7c5a")}>Einkaufsliste</button>
          <button onClick={speichereWoche} style={btnStyle("#a05a2c")}>Speichern</button>
          <button onClick={druckeWochenplan} style={btnStyle("#8a6a4c")}>Drucken</button>
        </>}
      </div>

      {einkaufsliste && (
        <EinkaufslistePanel
          liste={einkaufsliste}
          weekDates={weekDates}
          onClose={() => setEinkaufsliste(null)}
          onToggle={toggleAbhaken}
          onAdd={fuegeEinkaufslisteItemHinzu}
          onRemove={entferneEinkaufslisteItem}
        />
      )}

      {Object.keys(plan).length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#b08968" }}>
          <p style={{ fontSize: 18, fontWeight: 700, color: "#7c5c42" }}>Noch kein Plan für diese Woche.</p>
          <p>Klicke auf „Wochenplan generieren" um loszulegen!</p>
        </div>
      ) : (<>
        <KuehlschrankPlan
          weekDates={weekDates}
          plan={plan}
          anwesendAn={anwesendAn}
          onSlot={(tag, m) => setEditSlot({ tag, m })}
          onTogglePerson={(person, datum, m) => togglePersonAnwesenheit(person, datum, m)}
        />
      </>)}

      {editSlot && (
        <SlotEditor
          slot={editSlot} plan={plan} rezepte={rezepte}
          onSave={(neu) => {
            const updated = { ...plan, [editSlot.tag]: { ...plan[editSlot.tag], [editSlot.m]: neu } };
            setWochenplan(prev => { const n = { ...prev, [weekKey]: updated }; save("wochenplan", n); return n; });
            setEditSlot(null);
          }}
          onClose={() => setEditSlot(null)}
        />
      )}
    </div>
  );
}

// ── Einkaufsliste ─────────────────────────────────────────────────────────────

function EinkaufslistePanel({ liste, weekDates, onClose, onToggle, onAdd, onRemove }) {
  const katReihenfolge = Object.keys(SUPERMARKT_KATEGORIEN);
  const alleKats = [...new Set([...katReihenfolge, ...Object.keys(liste)])];
  // Alle Kategorien anzeigen, nicht nur gefüllte – damit auch leere Kategorien ergänzt werden können
  const anzuzeigendeKats = alleKats;

  const gesamtAnzahl = Object.values(liste).flat().length;
  const abgehakt = Object.values(liste).flat().filter(i => i.abgehakt).length;

  const eingabeRefs = React.useRef({});
  const hinzufuegen = (kat) => {
    const ref = eingabeRefs.current[kat];
    const wert = ref?.value?.trim();
    if (!wert) return;
    onAdd(kat, wert);
    ref.value = "";
  };

  const drucken = () => {
    const html = `
      <div style="text-align:center; margin-bottom:24px;">
        <h1 style="font-size:26px; font-weight:800; color:#3b2412; margin:0;">Einkaufsliste</h1>
        <div style="font-size:13px; color:#a05a2c; margin-top:4px; font-weight:600;">KW ab ${weekDates[0]}</div>
      </div>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:18px;">
        ${anzuzeigendeKats.filter(k => (liste[k] || []).length > 0).map(kat => `
          <div style="break-inside: avoid; margin-bottom:14px;">
            <div style="font-size:13px; font-weight:800; color:#a05a2c; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; border-bottom:2px solid #e8d4ba; padding-bottom:4px;">${kat}</div>
            ${(liste[kat] || []).map(item => `
              <div style="display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; color:#3b2412;">
                <span style="width:13px; height:13px; border:1.5px solid #c2a880; border-radius:3px; display:inline-block; flex-shrink:0;"></span>
                <span style="flex:1;">${item.zutat}</span>
                ${(item.menge != null && item.einheit) ? `<span style="color:#a05a2c; font-weight:700; font-size:11px;">${item.menge} ${item.einheit}</span>` : ""}
              </div>
            `).join("")}
          </div>
        `).join("")}
      </div>
      <div style="text-align:center; margin-top:20px; font-size:11px; color:#cbb89c;">Familienküche</div>
    `;
    druckeHtml(`Einkaufsliste ${weekDates[0]}`, html, "A4 portrait");
  };

  return (
    <div style={{ background: "#fff", border: "2px solid #6b9c7a", borderRadius: 16, padding: 0, marginBottom: 28, overflow: "hidden", boxShadow: "0 4px 24px #4d7c5a1a" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#4d7c5a,#6b9c7a)", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h3 style={{ margin: 0, color: "#fff", fontSize: 18, fontWeight: 800 }}>Einkaufsliste</h3>
          <div style={{ color: "#dcecdf", fontSize: 13, marginTop: 2 }}>KW ab {weekDates[0]} · {abgehakt}/{gesamtAnzahl} erledigt</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {/* Fortschrittsbalken */}
          <div style={{ width: 100, height: 8, background: "#ffffff33", borderRadius: 99 }}>
            <div style={{ width: `${gesamtAnzahl ? (abgehakt / gesamtAnzahl) * 100 : 0}%`, height: "100%", background: "#fff", borderRadius: 99, transition: "width .3s" }} />
          </div>
          <button onClick={drucken} style={{ background: "#ffffff33", border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontSize: 13, padding: "5px 12px", fontWeight: 700 }}>Drucken</button>
          <button onClick={onClose} style={{ background: "#ffffff33", border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontSize: 18, padding: "4px 10px", fontWeight: 700 }}>×</button>
        </div>
      </div>

      {/* Kategorien */}
      <div className="einkauf-grid">
        {anzuzeigendeKats.map(kat => {
          const items = liste[kat] || [];
          const alleAbgehakt = items.length > 0 && items.every(i => i.abgehakt);
          return (
            <div key={kat} style={{ background: alleAbgehakt ? "#f0fdf4" : "#f8fafc", borderRadius: 12, border: `1px solid ${alleAbgehakt ? "#86efac" : "#e2e8f0"}`, overflow: "hidden", transition: "all .2s" }}>
              {/* Kategorie-Header */}
              <div style={{ padding: "10px 14px", background: alleAbgehakt ? "#dcfce7" : "#f1f5f9", borderBottom: `1px solid ${alleAbgehakt ? "#86efac" : "#e2e8f0"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontWeight: 700, fontSize: 14, color: alleAbgehakt ? "#166534" : "#334155" }}>{kat}</span>
                {items.length > 0 && (
                  <span style={{ fontSize: 12, color: "#94a3b8", background: "#fff", borderRadius: 99, padding: "2px 8px" }}>
                    {items.filter(i => i.abgehakt).length}/{items.length}
                  </span>
                )}
              </div>
              {/* Items */}
              <div style={{ padding: "8px 4px" }}>
                {items.map(item => (
                  <label key={item.id} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "7px 10px", cursor: "pointer",
                    borderRadius: 8, transition: "background .15s",
                    textDecoration: item.abgehakt ? "line-through" : "none",
                    color: item.abgehakt ? "#94a3b8" : "#1e293b",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <input
                      type="checkbox"
                      checked={item.abgehakt}
                      onChange={() => onToggle(kat, item.id)}
                      style={{ width: 16, height: 16, accentColor: "#059669", cursor: "pointer", flexShrink: 0 }}
                    />
                    <span style={{ fontSize: 14, flex: 1 }}>{item.zutat}</span>
                    {(item.menge != null && item.einheit) && (
                      <span style={{ fontSize: 12, fontWeight: 700, color: item.abgehakt ? "#cbd5e1" : "#059669", background: item.abgehakt ? "#f1f5f9" : "#dcfce7", borderRadius: 99, padding: "1px 7px", flexShrink: 0 }}>
                        {item.menge} {item.einheit}
                      </span>
                    )}
                    <button onClick={(e) => { e.preventDefault(); onRemove(kat, item.id); }} title="Entfernen" style={{ background: "none", border: "none", color: "#cbb89c", cursor: "pointer", fontSize: 14, fontWeight: 700, padding: "0 2px", flexShrink: 0 }}>×</button>
                  </label>
                ))}
                {/* Freitext-Eingabe zum Ergänzen */}
                <div style={{ display: "flex", gap: 6, padding: "6px 10px 4px" }}>
                  <input
                    ref={el => (eingabeRefs.current[kat] = el)}
                    placeholder="Hinzufügen…"
                    onKeyDown={e => e.key === "Enter" && hinzufuegen(kat)}
                    autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
                    style={{ flex: 1, fontSize: 13, padding: "5px 9px", border: "1px solid #e2e8f0", borderRadius: 7, fontFamily: "inherit" }}
                  />
                  <button onClick={() => hinzufuegen(kat)} style={{ background: "#4d7c5a", color: "#fff", border: "none", borderRadius: 7, padding: "5px 11px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer */}
      {abgehakt === gesamtAnzahl && gesamtAnzahl > 0 && (
        <div style={{ background: "#f0fdf4", borderTop: "2px solid #86efac", padding: "14px 24px", textAlign: "center", color: "#166534", fontWeight: 700, fontSize: 16 }}>
          Alles im Einkaufskorb! Viel Spaß beim Kochen!
        </div>
      )}
    </div>
  );
}

function MahlzeitKarte({ mahlzeit, onClick, anwesend = [], onTogglePerson }) {
  const PräsenzZeile = () => (
    <div style={{ display: "flex", gap: 4, justifyContent: "center", marginBottom: 4 }} onClick={e => e.stopPropagation()}>
      {FAMILIE.map(p => (
        <span key={p}
          title={anwesend.includes(p) ? `${p} isst mit – klicken zum Abmelden` : `${p} ist abwesend – klicken zum Anmelden`}
          onClick={() => onTogglePerson?.(p)}
          style={{
            width: 8, height: 8, borderRadius: "50%", cursor: "pointer", transition: "all .15s",
            background: anwesend.includes(p) ? farbeFuer(p) : "#e8d9c8",
          }}>
        </span>
      ))}
    </div>
  );

  if (!mahlzeit) return (
    <div style={{ width: "100%", minHeight: 86, background: "#fff8f0", border: "2px dashed #f0d9c4", borderRadius: 12, padding: "8px 4px" }}>
      <PräsenzZeile />
      <button onClick={onClick} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", color: "#e0c4a8", fontSize: 22, padding: 0 }}>+</button>
    </div>
  );
  const isAbenteuer = !!mahlzeit.abenteuer;
  return (
    <div onClick={onClick} style={{
      background: "#fff",
      border: isAbenteuer ? "2px solid #f0c69a" : "1px solid #f3e4d4",
      borderRadius: 12, overflow: "hidden", cursor: "pointer", minHeight: 86,
      padding: "8px 9px 9px",
      transition: "box-shadow .15s, transform .15s",
    }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 6px 18px #a0703022"; e.currentTarget.style.transform = "translateY(-1px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "none"; }}
    >
      <PräsenzZeile />
      {isAbenteuer && <div style={{ fontSize: 10, fontWeight: 700, color: "#c2410c", marginBottom: 3 }}>{mahlzeit.abenteuer}</div>}
      <div style={{ fontWeight: 600, fontSize: 13, color: "#3b2412", lineHeight: 1.3 }}>{mahlzeit.name}</div>
      {mahlzeit.dauer ? <div style={{ fontSize: 11, color: "#b08968", marginTop: 2 }}>{mahlzeit.dauer} Min</div> : null}
      {mahlzeit.link && (
        <a href={mahlzeit.link} target="_blank" rel="noreferrer"
          onClick={e => e.stopPropagation()}

          Rezept
        </a>
      )}
    </div>
  );
}

// ── Rezepte ───────────────────────────────────────────────────────────────────

function RezepteView({ rezepte, setRezepte }) {
  const [neu, setNeu] = useState(false);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ name: "", kategorie: "", dauer: "", link: "", zutaten: "", tags: "", beschreibung: "" });
  const [fotoStatus, setFotoStatus] = useState(null); // null | "laden" | {fehler}
  const fotoInputRef = React.useRef(null);

  const fotoGewaehlt = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = ""; // erlaubt erneutes Wählen desselben Fotos
    if (!file) return;
    if (!getApiKey()) {
      setFotoStatus({ fehler: "Kein API-Schlüssel hinterlegt. Bitte zuerst unter „Sync“ → „KI-Funktionen“ deinen Anthropic-API-Schlüssel eintragen." });
      return;
    }
    setFotoStatus("laden");
    try {
      const r = await rezeptAusFoto(file);
      // Erkanntes Rezept ins Formular übernehmen (Zutaten als lesbaren Text)
      const zutatenText = (r.zutaten || []).map(z => `${z.name} ${z.menge ?? ""} ${z.einheit ?? ""}`.trim()).join(", ");
      setForm({
        name: r.name || "",
        kategorie: r.kategorie || "",
        dauer: r.dauer ? String(r.dauer) : "",
        link: "",
        zutaten: zutatenText,
        tags: (r.tags || []).join(", "),
        beschreibung: r.beschreibung || "",
      });
      setFotoStatus(null);
      setNeu(true); // Formular öffnen zur Kontrolle
    } catch (err) {
      const m = String(err.message || err);
      let txt = "Es ist ein Fehler aufgetreten. Bitte erneut versuchen.";
      if (m.includes("KEIN_KEY")) txt = "Kein API-Schlüssel hinterlegt. Bitte unter „Sync“ → „KI-Funktionen“ eintragen.";
      else if (m.includes("KEY_UNGUELTIG")) txt = "Der API-Schlüssel ist ungültig. Bitte unter „Sync“ prüfen.";
      else if (m.includes("KEIN_REZEPT")) txt = "Auf dem Foto wurde kein Rezept erkannt. Bitte ein deutlicheres Foto einer Rezeptseite verwenden.";
      else if (m.includes("PARSE_FEHLER")) txt = "Die Antwort konnte nicht verarbeitet werden. Bitte erneut versuchen.";
      else if (m.includes("API_FEHLER")) txt = "Verbindung zur KI fehlgeschlagen (" + m.replace("API_FEHLER: ", "") + ").";
      setFotoStatus({ fehler: txt });
    }
  };

  const sLower = search.toLowerCase();
  const passt = (r) =>
    r.name.toLowerCase().includes(sLower) ||
    (r.kategorie || "").toLowerCase().includes(sLower) ||
    (r.tags || []).some(t => t.toLowerCase().includes(sLower)) ||
    (r.abenteuer ? (r.abenteuer.toLowerCase().includes(sLower) || "abenteuer".includes(sLower)) : false);
  const gefiltert = rezepte.filter(passt);
  const eigeneRezepte   = gefiltert.filter(r => !/^r\d+$/.test(r.id) && !/^b\d+$/.test(r.id));
  const brotboxRezepte  = gefiltert.filter(r => /^b\d+$/.test(r.id));
  const beliebteRezepte = gefiltert.filter(r => /^r\d+$/.test(r.id));
  const abenteuerGefiltert = ABENTEUER_REZEPTE.filter(passt);

  const speichern = () => {
    if (!form.name) return;
    const zutatenParsed = form.zutaten.split(",").map(s => s.trim()).filter(Boolean).map(s => {
      // Format: "Name Menge Einheit", z.B. "Mehl 200 g" oder "Zwiebeln 2 Stück" oder nur "Salz"
      const m = s.match(/^(.+?)\s+([\d.,]+)\s*(g|kg|ml|l|EL|TL|Stück|Bund|Zehe|Prise|Scheibe|Päckchen|Portion|Blatt|Stange)$/i);
      if (m) return { name: m[1].trim(), menge: parseFloat(m[2].replace(",", ".")), einheit: m[3] };
      return { name: s, menge: 1, einheit: "Portion" };
    });
    const r = { id: genId(), ...form, zutaten: zutatenParsed, tags: form.tags.split(",").map(s => s.trim()).filter(Boolean), dauer: parseInt(form.dauer) || 0, bewertungen: {} };
    const updated = [...rezepte, r];
    setRezepte(updated); save("rezepte", updated);
    setNeu(false); setForm({ name: "", kategorie: "", dauer: "", link: "", zutaten: "", tags: "", beschreibung: "" });
  };

  const löschen = (id) => {
    const updated = rezepte.filter(r => r.id !== id);
    setRezepte(updated); save("rezepte", updated);
  };

  const bewerteRezept = (id, person, wert) => {
    // wert: 1 (👍), -1 (👎), oder 0 (Bewertung entfernen wenn nochmal getippt)
    const updated = rezepte.map(r => {
      if (r.id !== id) return r;
      const bisherige = (r.bewertungen || {})[person];
      const neueWertung = bisherige === wert ? undefined : wert; // nochmal tippen = entfernen
      const neueBewertungen = { ...(r.bewertungen || {}), [person]: neueWertung };
      if (neueWertung === undefined) delete neueBewertungen[person];
      return { ...r, bewertungen: neueBewertungen };
    });
    setRezepte(updated); save("rezepte", updated);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <input placeholder="Rezept suchen…" value={search} onChange={e => setSearch(e.target.value)} style={{ ...inputStyle, flex: 1 }} />
        <button onClick={() => fotoInputRef.current?.click()} disabled={fotoStatus === "laden"} style={{ ...btnStyle("#0891b2"), opacity: fotoStatus === "laden" ? 0.6 : 1 }}>
          {fotoStatus === "laden" ? "Erkenne Rezept…" : "Rezept per Foto"}
        </button>
        <button onClick={() => setNeu(true)} style={btnStyle("#6366f1")}>+ Rezept hinzufügen</button>
        <input ref={fotoInputRef} type="file" accept="image/*" capture="environment" onChange={fotoGewaehlt} style={{ display: "none" }} />
      </div>

      {fotoStatus && fotoStatus !== "laden" && fotoStatus.fehler && (
        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", color: "#991b1b", borderRadius: 10, padding: "12px 16px", marginBottom: 16, fontSize: 14 }}>
          {fotoStatus.fehler}
          <button onClick={() => setFotoStatus(null)} style={{ marginLeft: 12, background: "none", border: "none", color: "#991b1b", cursor: "pointer", fontWeight: 700 }}>×</button>
        </div>
      )}
      {fotoStatus === "laden" && (
        <div style={{ background: "#ecfeff", border: "1px solid #a5f3fc", color: "#155e75", borderRadius: 10, padding: "12px 16px", marginBottom: 16, fontSize: 14 }}>
          Das Foto wird analysiert und in ein Rezept umgewandelt – einen Moment bitte…
        </div>
      )}

      <div style={{ marginBottom: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#4d7c5a" }} />
          <h3 style={{ color: "#4d7c5a", margin: 0 }}>Unsere eigenen Rezepte ({eigeneRezepte.length})</h3>
        </div>
        <div className="rezepte-grid">
          {eigeneRezepte.map(r => <RezeptKarte key={r.id} r={r} onDelete={() => löschen(r.id)} onRate={(person, wert) => bewerteRezept(r.id, person, wert)} akzent="#4d7c5a" />)}
          {eigeneRezepte.length === 0 && (
            <p style={{ color: "#b08968", gridColumn: "1/-1", fontSize: 14 }}>
              Noch keine eigenen Rezepte – füge eines über „+ Rezept hinzufügen" oder „Rezept per Foto" hinzu.
            </p>
          )}
        </div>
      </div>

      <div style={{ marginBottom: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#c2410c" }} />
          <h3 style={{ color: "#c2410c", margin: 0 }}>Beliebte Familienrezepte ({beliebteRezepte.length})</h3>
        </div>
        <div className="rezepte-grid">
          {beliebteRezepte.map(r => <RezeptKarte key={r.id} r={r} onDelete={() => löschen(r.id)} onRate={(person, wert) => bewerteRezept(r.id, person, wert)} akzent="#c2410c" />)}
          {beliebteRezepte.length === 0 && <p style={{ color: "#b08968", gridColumn: "1/-1", fontSize: 14 }}>Keine Rezepte gefunden.</p>}
        </div>
      </div>

      <div style={{ marginBottom: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#4d7c5a" }} />
          <h3 style={{ color: "#4d7c5a", margin: 0 }}>Brotbox-Rezepte ({brotboxRezepte.length})</h3>
        </div>
        <div className="rezepte-grid">
          {brotboxRezepte.map(r => <RezeptKarte key={r.id} r={r} onDelete={() => löschen(r.id)} onRate={(person, wert) => bewerteRezept(r.id, person, wert)} akzent="#4d7c5a" />)}
          {brotboxRezepte.length === 0 && <p style={{ color: "#b08968", gridColumn: "1/-1", fontSize: 14 }}>Keine Brotbox-Rezepte gefunden.</p>}
        </div>
      </div>

      {abenteuerGefiltert.length > 0 && (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#7c3aed" }} />
            <h3 style={{ color: "#7c3aed", margin: 0 }}>Abenteuer-Rezepte der App</h3>
          </div>
          <div className="rezepte-grid">
            {abenteuerGefiltert.map(r => <RezeptKarte key={r.id} r={r} readonly onRate={(person, wert) => bewerteRezept(r.id, person, wert)} akzent="#7c3aed" />)}
          </div>
        </div>
      )}

      {neu && (
        <Modal title="Neues Rezept hinzufügen" onClose={() => setNeu(false)}>
          {[["name", "Rezeptname *"], ["kategorie", "Kategorie (z.B. Pasta, Suppe…)"], ["dauer", "Dauer in Minuten"], ["link", "Link zum Rezept (URL)"], ["zutaten", "Zutaten, kommagetrennt – z.B. \"Mehl 200 g, Zwiebeln 2 Stück, Salz\""], ["tags", "Tags (kommagetrennt, z.B. Kinder mögen's, Gesund)"], ["beschreibung", "Kurzbeschreibung"]].map(([key, label]) => (
            <div key={key} style={{ marginBottom: 12 }}>
              <label style={{ display: "block", fontSize: 13, color: "#475569", marginBottom: 4 }}>{label}</label>
              {key === "beschreibung"
                ? <textarea value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={{ ...inputStyle, height: 64, resize: "vertical" }} />
                : <input value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={inputStyle} />
              }
            </div>
          ))}
          <button onClick={speichern} style={{ ...btnStyle("#059669"), width: "100%" }}>Rezept speichern</button>
        </Modal>
      )}
    </div>
  );
}

// Farbe pro Rezept-Kategorie für den oberen Kartenrand

  "Pasta":        "#c2410c",
  "Pizza":        "#b45309",
  "Kartoffeln":   "#92400e",
  "Suppe":        "#0f766e",
  "Hähnchen":     "#b45309",
  "Fleisch":      "#991b1b",

  "Vegan":          ["#3d7a48", "#dcf0dc"],
  "Gesund":         ["#0f766e", "#d0f0ec"],
  "Fisch":          ["#0369a1", "#dbeafe"],

  "Finger Food":    ["#b16328", "#fef0e0"],
  "Spaßig":         ["#a05a2c", "#fdf0e0"],
  "Grillen":        ["#991b1b", "#fee2e2"],
  "Sommer":         ["#b45309", "#fef9c3"],
  "Comfort Food":   ["#92400e", "#fde8cc"],

function tagFarben(tag) {
  return TAG_FARBEN[tag] || ["#7c5c42", "#f3e8da"];
}

function RezeptKarte({ r, onDelete, readonly, akzent, onRate }) {
  const [offen, setOffen] = useState(false);
  const kartenAkzent = akzent || kategorieAkzent(r.kategorie);
  const bewertungen = r.bewertungen || {};

  // Durchschnittsscore: Summe / Anzahl Bewerter (fair, unabhängig von Familiengröße)
  const stimmen = Object.values(bewertungen).filter(v => v !== undefined);
  const durchschnitt = stimmen.length > 0 ? stimmen.reduce((a, b) => a + b, 0) / stimmen.length : 0;

  return (
    <div style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 6px 18px #a0703014", border: "1px solid #f3e4d4", position: "relative" }}>
      <div style={{ height: 5, background: kartenAkzent }} />
      <div style={{ padding: "12px 14px 0", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        {r.abenteuer ? <span style={{ fontSize: 11, fontWeight: 700, color: kartenAkzent, background: kartenAkzent + "1a", borderRadius: 999, padding: "3px 10px" }}>{r.abenteuer}</span> : <span />}
        {!readonly && (
          <button onClick={onDelete} title="Löschen" style={{ background: "none", border: "none", borderRadius: 999, width: 24, height: 24, cursor: "pointer", color: kartenAkzent, fontSize: 16, fontWeight: 700 }}>×</button>
        )}
      </div>
      <div style={{ padding: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 15, color: "#3b2412" }}>{r.name}</div>
        <div style={{ fontSize: 12, color: "#b08968", marginTop: 2 }}>{r.kategorie}{r.dauer ? ` · ${r.dauer} Min` : ""}</div>
        {r.beschreibung && <p style={{ fontSize: 13, color: "#7c5c42", margin: "8px 0 4px", lineHeight: 1.4 }}>{r.beschreibung}</p>}
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
          {r.tags?.map(t => {
            const [fg, bg] = tagFarben(t);
            return <span key={t} style={{ background: bg, color: fg, borderRadius: 999, fontSize: 11, padding: "2px 9px", fontWeight: 600 }}>{t}</span>;
          })}
        </div>

        {/* Bewertungen pro Person */}
        <div style={{ marginTop: 12, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          {FAMILIE.map(person => {
            const wert = bewertungen[person];
            const farbe = farbeFuer(person);
            return (
              <div key={person} style={{ display: "flex", gap: 3, alignItems: "center" }}>
                <span style={{ width: 18, height: 18, borderRadius: "50%", background: farbe, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#fff", flexShrink: 0 }}>
                  {person[0]}
                </span>
                <button
                  onClick={() => onRate?.(person, 1)}
                  title={`${person}: gefällt mir`}
                  style={{ background: wert === 1 ? farbe : "#f3e4d4", border: "none", borderRadius: 6, width: 24, height: 22, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s", padding: 0 }}
                >👍</button>
                <button
                  onClick={() => onRate?.(person, -1)}
                  title={`${person}: gefällt mir nicht`}
                  style={{ background: wert === -1 ? farbe : "#f3e4d4", border: "none", borderRadius: 6, width: 24, height: 22, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s", padding: 0 }}
                >👎</button>
              </div>
            );
          })}
          {stimmen.length > 0 && (
            <span style={{ fontSize: 11, color: durchschnitt > 0 ? "#4d7c5a" : durchschnitt < 0 ? "#c2410c" : "#b08968", fontWeight: 700, marginLeft: 4 }}>
              {durchschnitt > 0 ? "+" : ""}{Math.round(durchschnitt * 100)}%
            </span>
          )}
        </div>

        <div style={{ display: "flex", gap: 12, marginTop: 10, alignItems: "center" }}>
          {r.link && <a href={r.link} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: kartenAkzent, fontWeight: 600 }}>Rezept öffnen</a>}
          <button onClick={() => setOffen(!offen)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: "#b08968", padding: 0, fontWeight: 600 }}>
            {offen ? "Weniger" : "Zutaten"}
          </button>
        </div>
        {offen && r.zutaten?.length > 0 && (
          <div style={{ marginTop: 8, fontSize: 12, color: "#7c5c42", lineHeight: 1.5 }}>
            {r.zutaten.map(z => typeof z === "string" ? z : `${z.menge} ${z.einheit} ${z.name}`).join(" · ")}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Vorlieben ─────────────────────────────────────────────────────────────────

const UNVERTRAEGLICHKEITEN = ["Gluten", "Laktose", "Fruktose", "Nüsse", "Ei", "Fisch", "Soja", "Schalentiere"];
const ERNAEHRUNGSWEISEN = ["Alles", "Vegetarisch", "Vegan"];

function VorliebenView({ vorlieben, setVorlieben, avatarFarben, setAvatarFarben }) {
  const [aktPerson, setAktPerson] = useState("Jette");
  const [magInput, setMagInput] = useState("");
  const [magNichtInput, setMagNichtInput] = useState("");
  const v = vorlieben[aktPerson] || { mag: [], magNicht: [], unvertraeglichkeiten: [], ernaehrung: "Alles" };

  const wechslePerson = (p) => { setAktPerson(p); setMagInput(""); setMagNichtInput(""); };

  const update = (fn) => {
    const updated = { ...vorlieben, [aktPerson]: fn(v) };
    setVorlieben(updated); save("vorlieben", updated);
  };

  const addMag = () => {
    const val = magInput.trim(); if (!val) return;
    update(v => ({ ...v, mag: [...new Set([...v.mag, val])] }));
    setMagInput("");
  };
  const removeMag = (item) => update(v => ({ ...v, mag: v.mag.filter(x => x !== item) }));
  const addMagNicht = () => {
    const val = magNichtInput.trim(); if (!val) return;
    update(v => ({ ...v, magNicht: [...new Set([...v.magNicht, val])] }));
    setMagNichtInput("");
  };
  const removeMagNicht = (item) => update(v => ({ ...v, magNicht: v.magNicht.filter(x => x !== item) }));

  const toggleUnvertraeglichkeit = (u) => {
    const list = v.unvertraeglichkeiten || [];
    update(v => ({ ...v, unvertraeglichkeiten: list.includes(u) ? list.filter(x => x !== u) : [...list, u] }));
  };
  const setErnaehrung = (ew) => update(v => ({ ...v, ernaehrung: ew }));
  const unvertrList = v.unvertraeglichkeiten || [];
  const ernaehrung = v.ernaehrung || "Alles";

  return (
    <div>
      {/* Personen-Tabs */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        {FAMILIE.map(p => (
          <button key={p} onClick={() => wechslePerson(p)} style={{
            background: aktPerson === p ? farbeFuer(p) + "33" : "#fff",
            border: `2px solid ${aktPerson === p ? farbeFuer(p) : "#f3e4d4"}`,
            borderRadius: 99, padding: "6px 16px 6px 6px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
            fontWeight: aktPerson === p ? 700 : 600, fontSize: 15, color: "#3b2412", transition: "all .2s",
          }}>
            <InitialenAvatar person={p} size={28} />
            {p}
          </button>
        ))}
      </div>

      {/* Avatar + Name */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>

// ── Kalender ──────────────────────────────────────────────────────────────────

function KalenderView({ kalender, setKalender }) {
  const [aktPerson, setAktPerson] = useState("Jette");
  const [weekOffset, setWeekOffset] = useState(1);
  const weekDates = getWeekDates(weekOffset);
  const abwesenheiten = kalender[aktPerson] || [];

  const istAbwesend = (datum, mahlzeit) =>
    abwesenheiten.includes(`${datum}|ganztags`) || abwesenheiten.includes(`${datum}|${mahlzeit}`);

  const toggleMahlzeit = (datum, mahlzeit) => {
    const ganztagsKey = `${datum}|ganztags`;
    const key = `${datum}|${mahlzeit}`;
    let updated;
    if (abwesenheiten.includes(ganztagsKey)) {
      // Ganztags abwesend -> auflösen in Einzelmahlzeiten, außer der angeklickten
      updated = abwesenheiten.filter(k => k !== ganztagsKey);
      MAHLZEITEN.forEach(m => { if (m !== mahlzeit) updated.push(`${datum}|${m}`); });
    } else if (abwesenheiten.includes(key)) {
      updated = abwesenheiten.filter(k => k !== key);
    } else {
      updated = [...abwesenheiten, key];
    }
    const n = { ...kalender, [aktPerson]: updated };
    setKalender(n); save("kalender", n);
  };

  const toggleGanzerTag = (datum) => {
    const ganztagsKey = `${datum}|ganztags`;
    let updated;
    if (abwesenheiten.includes(ganztagsKey)) {
      // Ganztags-Abwesenheit aufheben (inkl. eventueller Einzelmahlzeiten an dem Tag)
      updated = abwesenheiten.filter(k => !k.startsWith(`${datum}|`));
    } else {
      // Alles für diesen Tag entfernen und durch "ganztags" ersetzen
      updated = [...abwesenheiten.filter(k => !k.startsWith(`${datum}|`)), ganztagsKey];
    }
    const n = { ...kalender, [aktPerson]: updated };
    setKalender(n); save("kalender", n);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        {FAMILIE.map(p => (
          <button key={p} onClick={() => setAktPerson(p)} style={{
            background: aktPerson === p ? farbeFuer(p) : "#f1f5f9",
            border: `2px solid ${aktPerson === p ? farbeFuer(p) : "#e2e8f0"}`,
            borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontWeight: aktPerson === p ? 700 : 400, fontSize: 16,
          }}>
            {p}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
        <button onClick={() => setWeekOffset(w => w - 1)} style={btnStyle("#334155")}>← Vorherige Woche</button>
        <span style={{ fontWeight: 600, color: "#1e293b" }}>
          KW ab {weekDates[0]} – {weekDates[6]}
          {weekOffset === 1 ? " · Aktuelle Planwoche" : ""}
        </span>
        <button onClick={() => setWeekOffset(w => w + 1)} style={btnStyle("#334155")}>Nächste Woche →</button>
      </div>
      <p style={{ fontSize: 13, color: "#94a3b8", margin: "0 0 16px" }}>
        Klick auf eine Mahlzeit = nur diese Mahlzeit abmelden (z.B. Mittagessen wegen Schule). Klick auf den Tagesnamen = ganzer Tag abwesend.
      </p>

      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 6 }}>
          <thead>
            <tr>
              <th style={{ width: 90 }}></th>
              {WOCHENTAGE.map((tag, i) => {
                const datum = weekDates[i];
                const ganztags = abwesenheiten.includes(`${datum}|ganztags`);
                return (
                  <th key={tag} onClick={() => toggleGanzerTag(datum)} style={{
                    background: ganztags ? "#fee2e2" : "#f8fafc",
                    border: `2px solid ${ganztags ? "#fca5a5" : "transparent"}`,
                    borderRadius: 8, padding: "8px 6px", textAlign: "center", minWidth: 100, cursor: "pointer",
                  }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#1e293b" }}>{tag.slice(0, 2)}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8" }}>{datum}</div>
                    {ganztags && <div style={{ fontSize: 10, color: "#dc2626", fontWeight: 700, marginTop: 2 }}>Ganzer Tag</div>}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {MAHLZEITEN.map(m => (
              <tr key={m}>
                <td style={{ padding: "6px 10px", fontWeight: 600, fontSize: 13, color: MAHLZEIT_META[m].textfarbe, whiteSpace: "nowrap" }}>
                  <div style={{ background: MAHLZEIT_META[m].farbe, borderRadius: 8, padding: "5px 8px", display: "inline-block" }}>
                    {m}
                  </div>
                </td>
                {WOCHENTAGE.map((tag, i) => {
                  const datum = weekDates[i];
                  const ganztags = abwesenheiten.includes(`${datum}|ganztags`);
                  const abw = istAbwesend(datum, m);
                  return (
                    <td key={tag} style={{ textAlign: "center" }}>
                      <div onClick={() => !ganztags && toggleMahlzeit(datum, m)} style={{
                        background: ganztags ? "#fef2f2" : abw ? "#fef2f2" : "#f0fdf4",
                        border: `2px solid ${abw ? "#fca5a5" : "#86efac"}`,
                        borderRadius: 8, padding: "10px 4px", cursor: ganztags ? "default" : "pointer",
                        opacity: ganztags ? 0.5 : 1, transition: "all .2s",
                      }}>
                        <div style={{ fontSize: 18 }}>{abw ? "Abwesend" : "Dabei"}</div>
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ background: "#f8fafc", borderRadius: 12, padding: 20, marginTop: 24 }}>
        <h3 style={{ margin: "0 0 16px", color: "#1e293b" }}>Familienübersicht – diese Woche</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
          {FAMILIE.map(p => {
            const pAbw = kalender[p] || [];
            const einträge = [];
            weekDates.forEach((datum, i) => {
              const tag = WOCHENTAGE[i].slice(0, 2);
              if (pAbw.includes(`${datum}|ganztags`)) { einträge.push(`${tag} (ganzer Tag)`); return; }
              MAHLZEITEN.forEach(m => { if (pAbw.includes(`${datum}|${m}`)) einträge.push(`${tag} ${m[0]}`); });
            });
            return (
              <div key={p} style={{ background: "#fff", borderRadius: 8, padding: 12, border: `2px solid ${farbeFuer(p)}44` }}>
                <div style={{ fontWeight: 700, marginBottom: 6 }}>{p}</div>
                {einträge.length === 0
                  ? <div style={{ fontSize: 12, color: "#16a34a" }}>Immer da!</div>
                  : <div style={{ fontSize: 12, color: "#dc2626" }}>Abwesend: {einträge.join(", ")}</div>
                }
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Verlauf ───────────────────────────────────────────────────────────────────

function VerlaufView({ verlauf, vorlieben }) {
  const [detail, setDetail] = useState(null);
  if (!verlauf || verlauf.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px", color: "#94a3b8" }}>
        <p style={{ fontSize: 18, fontWeight: 700, color: "#64748b" }}>Noch keine gespeicherten Wochen.</p>
        <p>Erstelle einen Wochenplan und speichere ihn, um die Lernkurve zu sehen!</p>
      </div>
    );
  }

  // Häufigkeitsanalyse
  const rezeptHäufigkeit = {};
  const kategorieHäufigkeit = {};
  verlauf.forEach(w => {
    Object.values(w.plan || {}).forEach(tag => {
      Object.values(tag || {}).forEach(m => {
        if (m?.name && m.name.length > 3) {
          rezeptHäufigkeit[m.name] = (rezeptHäufigkeit[m.name] || 0) + 1;
          if (m.kategorie) kategorieHäufigkeit[m.kategorie] = (kategorieHäufigkeit[m.kategorie] || 0) + 1;
        }
      });
    });
  });
  const topRezepte = Object.entries(rezeptHäufigkeit).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const topKategorien = Object.entries(kategorieHäufigkeit).sort((a, b) => b[1] - a[1]).slice(0, 5);

  return (
    <div>
      <h2 style={{ color: "#1e293b", marginTop: 0 }}>Was die Familie liebt</h2>
      <p style={{ color: "#64748b" }}>Basierend auf {verlauf.length} gespeicherten Wochen</p>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <div style={{ background: "#eff6ff", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#1d4ed8", margin: "0 0 14px" }}>Häufigste Gerichte</h3>
          {topRezepte.map(([name, n]) => (
            <div key={name} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #bfdbfe", fontSize: 14 }}>
              <span>{name}</span>
              <span style={{ fontWeight: 700, color: "#1d4ed8" }}>×{n}</span>
            </div>
          ))}
          {topRezepte.length === 0 && <p style={{ color: "#93c5fd" }}>Noch keine Daten.</p>}
        </div>

        <div style={{ background: "#f0fdf4", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#166534", margin: "0 0 14px" }}>Beliebteste Kategorien</h3>
          {topKategorien.map(([kat, n]) => (
            <div key={kat} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: "1px solid #bbf7d0", fontSize: 14, alignItems: "center" }}>
              <div style={{ flex: 1 }}>{kat}</div>
              <div style={{ background: "#dcfce7", height: 12, borderRadius: 6, width: `${Math.min(n * 30, 100)}px` }} />
              <span style={{ fontWeight: 700, color: "#166534", minWidth: 24 }}>×{n}</span>
            </div>
          ))}
          {topKategorien.length === 0 && <p style={{ color: "#86efac" }}>Noch keine Daten.</p>}
        </div>
      </div>

      <h3 style={{ color: "#1e293b" }}>Gespeicherte Wochen</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {verlauf.map((w, i) => (
          <div key={i} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
            onClick={() => setDetail(detail === i ? null : i)}>
            <div>
              <div style={{ fontWeight: 700 }}>Woche ab {w.woche}</div>
              <div style={{ fontSize: 12, color: "#94a3b8" }}>Gespeichert {new Date(w.datum).toLocaleDateString("de-DE")}</div>
            </div>
            <span style={{ color: "#6366f1" }}>{detail === i ? "▲" : "▼"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const [sichtbar, setSichtbar] = useState(false);
  const speichern = () => {
    setApiKey(wert.trim());
    setGespeichert(true);
    setTimeout(() => setGespeichert(false), 2000);
  };
  return (
    <div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <input
          type={sichtbar ? "text" : "password"}
          value={wert}
