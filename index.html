};

// Migriert Rezepte mit altem/unvollständigem Zutaten-Format (Strings oder Objekte ohne Einheit/Menge)
// in das aktuelle Objekt-Format mit Mengen & Einheiten. Wird überall angewendet, wo Rezepte gesetzt werden
// (initial, lokal geladen UND aus der Cloud), damit alte Cloud-Daten die App nicht mehr verfälschen.
function migriereRezepte(liste) {
  if (!Array.isArray(liste)) return liste;
  const aktuelleById = {};
  [...STARTER_REZEPTE, ...ABENTEUER_REZEPTE].forEach(r => { aktuelleById[r.id] = r; });
  return liste.map(r => {
    if (!r || !Array.isArray(r.zutaten)) return r;
    const hatAlteZutaten = r.zutaten.some(z => typeof z === "string" || !z?.einheit || z?.menge == null);
    if (!hatAlteZutaten) return r;
    if (aktuelleById[r.id]) return { ...r, zutaten: aktuelleById[r.id].zutaten };
    return { ...r, zutaten: r.zutaten.map(z => (typeof z === "string") ? { name: z, menge: 1, einheit: "Portion" } : { name: z.name, menge: z.menge ?? 1, einheit: z.einheit || "Portion" }) };
  });
}

function loadSupabaseLib() {
  if (typeof window !== "undefined" && window.supabase) return Promise.resolve(window.supabase);
  if (_libPromise) return _libPromise;
  _libPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    s.onload = () => resolve(window.supabase);
    s.onerror = () => reject(new Error("Supabase-Bibliothek konnte nicht geladen werden"));
    document.head.appendChild(s);
  });
  return _libPromise;
}

async function connectSync({ url, key, household }, onRemote) {
  const lib = await loadSupabaseLib();
  _sb = lib.createClient(url, key);
  _household = household;
  // Realtime-Abo für diesen Haushalt
  _channel = _sb
    .channel("familienplaner-" + household)
    .on("postgres_changes",
      { event: "*", schema: "public", table: "familienplaner_data", filter: `household=eq.${household}` },
      payload => {
        const row = payload.new;
        if (row && onRemote) onRemote(row.key, row.value);
      })
    .subscribe();
  return _sb;
}

function disconnectSync() {
  try { if (_sb && _channel) _sb.removeChannel(_channel); } catch {}
  _sb = null; _household = null; _channel = null;
}

async function pullAll() {
  if (!_sb) return null;
  const { data, error } = await _sb.from("familienplaner_data").select("key,value").eq("household", _household);
  if (error) throw error;
  const out = {};
  (data || []).forEach(row => { out[row.key] = row.value; });
  return out;
}

async function pushOne(key, value) {
  if (!_sb || !_household) return;
  await _sb.from("familienplaner_data")
    .upsert({ household: _household, key, value, updated_at: new Date().toISOString() }, { onConflict: "household,key" });
}

// save() schreibt immer lokal und – falls verbunden – in die Cloud
const _zuletztGesendet = {}; // key -> timestamp, um eigene Echo-Updates kurz zu ignorieren
const save = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  if (DATEN_KEYS.includes(key)) {
    _zuletztGesendet[key] = Date.now();
    pushOne(key, val).catch(() => {});
  }
};

// ─── Hilfsfunktionen ──────────────────────────────────────────────────────────
function genId() { return Math.random().toString(36).slice(2, 9); }

function getWeekDates(offset = 0) {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  return WOCHENTAGE.map((_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
  });
}

function scoreRezept(rezept, vorlieben, anwesend) {
  let score = 0;
  anwesend.forEach(person => {
    const v = vorlieben[person] || { mag: [], magNicht: [] };
    if (v.mag.some(m => rezept.tags?.includes(m) || rezept.kategorie?.includes(m))) score += 2;
    if (v.magNicht.some(m => rezept.tags?.includes(m) || rezept.kategorie?.includes(m))) score -= 3;
  });
  return score;
}

// ── Wochenplan ────────────────────────────────────────────────────────────────

function WochenplanView({ wochenplan, setWochenplan, rezepte, vorlieben, kalender, setKalender, verlauf, setVerlauf }) {
  const [weekOffset, setWeekOffset] = useState(1);
  const [generating, setGenerating] = useState(false);
  const [editSlot, setEditSlot] = useState(null);
  const [einkaufsliste, setEinkaufsliste] = useState(null);

  const weekDates = getWeekDates(weekOffset);
  const weekKey = weekDates[0];
  const plan = wochenplan[weekKey] || {};

  const anwesendAn = (tag, mahlzeit) => {
    const datum = weekDates[WOCHENTAGE.indexOf(tag)];
    return FAMILIE.filter(p => {
      const abw = kalender[p] || [];
      if (abw.includes(`${datum}|ganztags`)) return false;
      if (mahlzeit && abw.includes(`${datum}|${mahlzeit}`)) return false;
      return true;
    });
  };

  const togglePersonAnwesenheit = (person, datum, mahlzeit) => {
    const key = `${datum}|${mahlzeit}`;
    const ganztagsKey = `${datum}|ganztags`;
    const bisher = kalender[person] || [];
    let updated;
    if (bisher.includes(ganztagsKey)) {
      // War ganztags abwesend -> jetzt für diese Mahlzeit wieder anwesend, Rest des Tages bleibt abwesend
      updated = bisher.filter(k => k !== ganztagsKey);
      MAHLZEITEN.forEach(m => { if (m !== mahlzeit) updated.push(`${datum}|${m}`); });
    } else if (bisher.includes(key)) {
      updated = bisher.filter(k => k !== key);
    } else {
      updated = [...bisher, key];
    }
    const n = { ...kalender, [person]: updated };
    setKalender(n); save("kalender", n);
  };

  const generiereWochenplan = async () => {
    setGenerating(true);
    await new Promise(r => setTimeout(r, 900));
    const alleRezepte = [...rezepte, ...ABENTEUER_REZEPTE];
    const neuerPlan = {};
    const genutzt = new Set();

    WOCHENTAGE.forEach((tag, ti) => {
      neuerPlan[tag] = {};
      const ganzerTagLeer = anwesendAn(tag, null).length === 0;
      if (ganzerTagLeer) { neuerPlan[tag]["Abendessen"] = null; return; }

      MAHLZEITEN.forEach(m => {
        const anwesend = anwesendAn(tag, m);
        if (anwesend.length === 0) { neuerPlan[tag][m] = null; return; }

        if (m === "Frühstück") {
          const optionen = ["Müsli mit Früchten & Joghurt", "Toast mit Aufschnitt & Käse", "Joghurt mit Granola & Beeren", "Rührei & Toast", "Haferbrei mit Banane", "Brötchen mit Marmelade", "Pfannkuchen"];
          neuerPlan[tag][m] = { name: optionen[ti % optionen.length], typ: "einfach" };
          return;
        }
        if (m === "Brotbox") {
          if ([5, 6].includes(ti)) { neuerPlan[tag][m] = null; return; } // Keine Brotbox am Wochenende
          const brotboxOptionen = [
            "Käsebrot & Apfel", "Laugenbrezel & Joghurt", "Sandwich mit Schinken", "Wraps mit Gemüse & Frischkäse",
            "Brot mit Frischkäse & Gurke", "Mini-Croissant & Trauben", "Brot mit Hüttenkäse & Paprika",
          ];
          neuerPlan[tag][m] = { name: brotboxOptionen[ti % brotboxOptionen.length], typ: "brotbox" };
          return;
        }
        if (m === "Mittagessen" && [0,1,2,3,4].includes(ti)) {
          neuerPlan[tag][m] = { name: "Schulessen / Reste", typ: "info" };
          return;
        }
        const verfügbar = alleRezepte.filter(r => !genutzt.has(r.id));
        const bewertet = verfügbar.map(r => ({ r, score: scoreRezept(r, vorlieben, anwesend) + (Math.random() * 2 - 1) }));
        bewertet.sort((a, b) => b.score - a.score);

        // Gelegentlich Abenteuer einstreuen (ca. 20%)
        let gewählt;
        if (Math.random() < 0.2) {
          const abent = ABENTEUER_REZEPTE.filter(r => !genutzt.has(r.id));
          gewählt = abent[Math.floor(Math.random() * abent.length)] || bewertet[0]?.r;
        } else {
          gewählt = bewertet[0]?.r;
        }

        if (gewählt) {
          genutzt.add(gewählt.id);
          neuerPlan[tag][m] = { ...gewählt };
        }
      });
    });

    setWochenplan(prev => { const n = { ...prev, [weekKey]: neuerPlan }; save("wochenplan", n); return n; });
    setGenerating(false);
  };

  const generiereEinkaufsliste = () => {
    const aktuelleById = {};
    const aktuelleByName = {};
    const zutatReferenz = {}; // Zutatname (lowercase) -> { einheit, menge } aus aktuellen Rezepten
    [...rezepte, ...ABENTEUER_REZEPTE].forEach(r => {
      aktuelleById[r.id] = r;
      aktuelleByName[r.name.toLowerCase()] = r;
      (r.zutaten || []).forEach(z => {
        if (z && typeof z === "object" && z.name && z.einheit && !zutatReferenz[z.name.toLowerCase()]) {
          zutatReferenz[z.name.toLowerCase()] = { einheit: z.einheit, menge: z.menge ?? 1 };
        }
      });
    });

    const zutatenMap = {}; // key: "name|einheit" -> { name, einheit, menge }
    Object.entries(plan).forEach(([tag, mahlzeitenDesTages]) => {
      Object.entries(mahlzeitenDesTages).forEach(([m, mahlzeit]) => {
        let zutatenListe = mahlzeit?.zutaten;
        // Immer die aktuellen Rezept-Zutaten bevorzugen, wenn die Mahlzeit einem bekannten Rezept entspricht
        // (per ID oder Name). So sind Mengen/Einheiten garantiert aktuell, auch bei alten gespeicherten Plänen.
        const passendesRezept = (mahlzeit?.id && aktuelleById[mahlzeit.id])
          || (mahlzeit?.name && aktuelleByName[mahlzeit.name.toLowerCase()]);
        if (passendesRezept) {
          zutatenListe = passendesRezept.zutaten;
        }
        if (zutatenListe) {
          // Rezept-Mengen sind für 4 Personen kalkuliert -> auf tatsächliche Anwesenheit skalieren
          const anwesendCount = anwesendAn(tag, m).length;
          const faktor = anwesendCount / FAMILIE.length;
          if (faktor <= 0) return;
          zutatenListe.forEach(z => {
            const name = (typeof z === "string") ? z.trim() : (z.name || "").trim();
            if (!name) return;
            // Einheit/Menge bestimmen; fehlt die Einheit, aus der Zutaten-Referenz der aktuellen Rezepte ergänzen
            const ref = zutatReferenz[name.toLowerCase()];
            let einheit = (typeof z === "string") ? null : z.einheit;
            let basisMenge = (typeof z === "string") ? null : z.menge;
            if (!einheit && ref) { einheit = ref.einheit; if (basisMenge == null) basisMenge = ref.menge; }
            einheit = einheit || "Portion";
            basisMenge = (basisMenge == null) ? 1 : basisMenge;
            const key = `${name}|${einheit}`;
            if (!zutatenMap[key]) zutatenMap[key] = { name, einheit, menge: 0 };
            zutatenMap[key].menge += basisMenge * faktor;
          });
        }
      });
    });
    // Mengen sinnvoll runden
    Object.values(zutatenMap).forEach(item => {
      if (item.einheit === "g" || item.einheit === "ml") {
        item.menge = Math.round(item.menge / 5) * 5; // auf 5er runden
      } else {
        item.menge = Math.round(item.menge * 4) / 4; // auf Viertel runden (z.B. 0.25 Zwiebel)
        if (item.menge < 0.25 && item.menge > 0) item.menge = 0.25;
      }
    });
    // Bereinigung: veraltete "Portion"-Einträge entfernen, wenn für dieselbe Zutat
    // bereits ein Eintrag mit einer "echten" Einheit (g, ml, Stück, ...) existiert.
    Object.keys(zutatenMap).forEach(key => {
      const item = zutatenMap[key];
      if (item.einheit !== "Portion") return;
      const hatEchteEinheit = Object.values(zutatenMap).some(
        other => other !== item && other.name.toLowerCase() === item.name.toLowerCase() && other.einheit !== "Portion"
      );
      if (hatEchteEinheit) delete zutatenMap[key];
    });
    // Kategorisieren
    const nachKategorie = {};
    Object.values(zutatenMap).forEach(({ name, einheit, menge }) => {
      if (menge <= 0) return;
      const kat = kategorieVonZutat(name);
      if (!nachKategorie[kat]) nachKategorie[kat] = [];
      nachKategorie[kat].push({ zutat: name, menge, einheit, abgehakt: false, id: genId() });
    });
    // Innerhalb jeder Kategorie alphabetisch sortieren
    Object.values(nachKategorie).forEach(liste => liste.sort((a, b) => a.zutat.localeCompare(b.zutat, "de")));
    setEinkaufsliste(nachKategorie);
  };

  const toggleAbhaken = (kat, id) => {
    setEinkaufsliste(prev => ({
      ...prev,
      [kat]: prev[kat].map(item => item.id === id ? { ...item, abgehakt: !item.abgehakt } : item),
    }));
  };

  const speichereWoche = () => {
    const eintrag = { woche: weekKey, plan: plan, datum: new Date().toISOString() };
    const neuer = [eintrag, ...(verlauf || []).filter(v => v.woche !== weekKey)].slice(0, 12);
    setVerlauf(neuer);
    save("verlauf", neuer);
    alert("✅ Wochenplan gespeichert!");
  };

  return (
    <div>
      {/* Header-Leiste */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <button onClick={() => setWeekOffset(w => w - 1)} style={btnStyle("#334155")}>← Vorherige</button>
        <h2 style={{ margin: 0, fontSize: 18, color: "#1e293b", flex: 1, textAlign: "center" }}>
          KW ab {weekDates[0]} – {weekDates[6]}
          {weekOffset === 1 ? " 📌 Aktuelle Planwoche" : ""}
        </h2>
        <button onClick={() => setWeekOffset(w => w + 1)} style={btnStyle("#334155")}>Nächste →</button>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        <button onClick={generiereWochenplan} disabled={generating} style={{ ...btnStyle("#6366f1"), fontSize: 15, padding: "10px 22px" }}>
          {generating ? "⏳ Plane..." : "✨ Wochenplan generieren"}
        </button>
        {Object.keys(plan).length > 0 && <>
          <button onClick={generiereEinkaufsliste} style={btnStyle("#059669")}>🛒 Einkaufsliste</button>
          <button onClick={speichereWoche} style={btnStyle("#b45309")}>💾 Woche speichern</button>
        </>}
      </div>

      {einkaufsliste && (
        <EinkaufslistePanel
          liste={einkaufsliste}
          weekDates={weekDates}
          onClose={() => setEinkaufsliste(null)}
          onToggle={toggleAbhaken}
        />
      )}

      {Object.keys(plan).length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#94a3b8" }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🍽️</div>
          <p style={{ fontSize: 18 }}>Noch kein Plan für diese Woche.</p>
          <p>Klicke auf „Wochenplan generieren" um loszulegen!</p>
        </div>
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 6 }}>
            <thead>
              <tr>
                <th style={{ width: 110, textAlign: "left", padding: "8px 12px", color: "#64748b", fontWeight: 600, fontSize: 13 }}></th>
                {WOCHENTAGE.map((tag, i) => (
                  <th key={tag} style={{ background: "#f8fafc", borderRadius: 8, padding: "8px 6px", textAlign: "center", minWidth: 140 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: "#1e293b" }}>{tag}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8" }}>{weekDates[i]}</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {MAHLZEITEN.map(m => (
                <tr key={m}>
                  <td style={{
                    padding: "8px 12px", fontWeight: 600, fontSize: 13, verticalAlign: "top",
                    color: MAHLZEIT_META[m].textfarbe,
                  }}>
                    <div style={{ background: MAHLZEIT_META[m].farbe, borderRadius: 8, padding: "6px 10px", display: "inline-block" }}>
                      {MAHLZEIT_META[m].emoji} {m}
                    </div>
                  </td>
                  {WOCHENTAGE.map(tag => {
                    const mahlzeit = plan[tag]?.[m];
                    const anwesend = anwesendAn(tag, m);
                    return (
                      <td key={tag} style={{ verticalAlign: "top" }}>
                        <MahlzeitKarte
                          mahlzeit={mahlzeit}
                          onClick={() => setEditSlot({ tag, m })}
                          anwesend={anwesend}
                          onTogglePerson={(person) => togglePersonAnwesenheit(person, weekDates[WOCHENTAGE.indexOf(tag)], m)}
                        />
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {editSlot && (
        <SlotEditor
          slot={editSlot} plan={plan} rezepte={rezepte}
          onSave={(neu) => {
            const updated = { ...plan, [editSlot.tag]: { ...plan[editSlot.tag], [editSlot.m]: neu } };
            setWochenplan(prev => { const n = { ...prev, [weekKey]: updated }; save("wochenplan", n); return n; });
            setEditSlot(null);
          }}
          onClose={() => setEditSlot(null)}
        />
      )}
    </div>
  );
}

                      type="checkbox"
                      checked={item.abgehakt}
                      onChange={() => onToggle(kat, item.id)}
                      style={{ width: 16, height: 16, accentColor: "#059669", cursor: "pointer", flexShrink: 0 }}
                    />
                    <span style={{ fontSize: 14, flex: 1 }}>{item.zutat}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: item.abgehakt ? "#cbd5e1" : "#059669", background: item.abgehakt ? "#f1f5f9" : "#dcfce7", borderRadius: 99, padding: "1px 7px", flexShrink: 0 }}>
                      {item.menge} {item.einheit}
                    </span>
                  </label>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer */}
      {abgehakt === gesamtAnzahl && gesamtAnzahl > 0 && (
        <div style={{ background: "#f0fdf4", borderTop: "2px solid #86efac", padding: "14px 24px", textAlign: "center", color: "#166534", fontWeight: 700, fontSize: 16 }}>
          🎉 Alles im Einkaufskorb! Viel Spaß beim Kochen!
        </div>
      )}
    </div>
  );
}

// ── Rezepte ───────────────────────────────────────────────────────────────────

function RezepteView({ rezepte, setRezepte }) {
  const [neu, setNeu] = useState(false);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ name: "", kategorie: "", dauer: "", link: "", zutaten: "", tags: "", beschreibung: "" });

  const gefiltert = rezepte.filter(r =>
    r.name.toLowerCase().includes(search.toLowerCase()) ||
    r.kategorie.toLowerCase().includes(search.toLowerCase())
  );

  const speichern = () => {
    if (!form.name) return;
    const zutatenParsed = form.zutaten.split(",").map(s => s.trim()).filter(Boolean).map(s => {
      // Format: "Name Menge Einheit", z.B. "Mehl 200 g" oder "Zwiebeln 2 Stück" oder nur "Salz"
      const m = s.match(/^(.+?)\s+([\d.,]+)\s*(g|kg|ml|l|EL|TL|Stück|Bund|Zehe|Prise|Scheibe|Päckchen|Portion|Blatt|Stange)$/i);
      if (m) return { name: m[1].trim(), menge: parseFloat(m[2].replace(",", ".")), einheit: m[3] };
      return { name: s, menge: 1, einheit: "Portion" };
    });
    const r = { id: genId(), ...form, zutaten: zutatenParsed, tags: form.tags.split(",").map(s => s.trim()).filter(Boolean), dauer: parseInt(form.dauer) || 0, bewertungen: {} };
    const updated = [...rezepte, r];
    setRezepte(updated); save("rezepte", updated);
    setNeu(false); setForm({ name: "", kategorie: "", dauer: "", link: "", zutaten: "", tags: "", beschreibung: "" });
  };

  const löschen = (id) => {
    const updated = rezepte.filter(r => r.id !== id);
    setRezepte(updated); save("rezepte", updated);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <input placeholder="🔍 Rezept suchen…" value={search} onChange={e => setSearch(e.target.value)} style={{ ...inputStyle, flex: 1 }} />
        <button onClick={() => setNeu(true)} style={btnStyle("#6366f1")}>+ Rezept hinzufügen</button>
      </div>

      <div style={{ marginBottom: 16 }}>
        <h3 style={{ color: "#7c3aed", margin: "0 0 12px" }}>✨ Abenteuer-Rezepte der App</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12 }}>
          {ABENTEUER_REZEPTE.map(r => <RezeptKarte key={r.id} r={r} readonly />)}
        </div>
      </div>

      <h3 style={{ color: "#1e293b", margin: "24px 0 12px" }}>📖 Familien-Rezeptbuch ({gefiltert.length})</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12 }}>
        {gefiltert.map(r => <RezeptKarte key={r.id} r={r} onDelete={() => löschen(r.id)} />)}
        {gefiltert.length === 0 && <p style={{ color: "#94a3b8", gridColumn: "1/-1" }}>Keine Rezepte gefunden.</p>}
      </div>

      {neu && (
        <Modal title="Neues Rezept hinzufügen" onClose={() => setNeu(false)}>
          {[["name", "Rezeptname *"], ["kategorie", "Kategorie (z.B. Pasta, Suppe…)"], ["dauer", "Dauer in Minuten"], ["link", "Link zum Rezept (URL)"], ["zutaten", "Zutaten, kommagetrennt – z.B. \"Mehl 200 g, Zwiebeln 2 Stück, Salz\""], ["tags", "Tags (kommagetrennt, z.B. Kinder mögen's, Gesund)"], ["beschreibung", "Kurzbeschreibung"]].map(([key, label]) => (
            <div key={key} style={{ marginBottom: 12 }}>
              <label style={{ display: "block", fontSize: 13, color: "#475569", marginBottom: 4 }}>{label}</label>
              {key === "beschreibung"
                ? <textarea value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={{ ...inputStyle, height: 64, resize: "vertical" }} />
                : <input value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={inputStyle} />
              }
            </div>
          ))}
          <button onClick={speichern} style={{ ...btnStyle("#059669"), width: "100%" }}>✅ Rezept speichern</button>
        </Modal>
      )}
    </div>
  );
}

        </div>
      )}

  );

// ── Vorlieben ─────────────────────────────────────────────────────────────────

function VorliebenView({ vorlieben, setVorlieben }) {
  const [aktPerson, setAktPerson] = useState("Jette");
  const magRef = React.useRef(null);
  const magNichtRef = React.useRef(null);
  const v = vorlieben[aktPerson] || { mag: [], magNicht: [] };

  const update = (fn) => {
    const updated = { ...vorlieben, [aktPerson]: fn(v) };
    setVorlieben(updated); save("vorlieben", updated);
  };

  const addMag = () => {
    const val = magRef.current?.value.trim();
    if (!val) return;
    update(v => ({ ...v, mag: [...new Set([...v.mag, val])] }));
    magRef.current.value = "";
  };
  const removeMag = (item) => update(v => ({ ...v, mag: v.mag.filter(x => x !== item) }));
  const addMagNicht = () => {
    const val = magNichtRef.current?.value.trim();
    if (!val) return;
    update(v => ({ ...v, magNicht: [...new Set([...v.magNicht, val])] }));
    magNichtRef.current.value = "";
  };
  const removeMagNicht = (item) => update(v => ({ ...v, magNicht: v.magNicht.filter(x => x !== item) }));

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 28, flexWrap: "wrap" }}>
        {FAMILIE.map(p => (
          <button key={p} onClick={() => setAktPerson(p)} style={{
            background: aktPerson === p ? FARBEN[p] : "#f1f5f9",
            border: `2px solid ${aktPerson === p ? FARBEN[p] : "#e2e8f0"}`,
            borderRadius: 12, padding: "10px 20px", cursor: "pointer",
            fontWeight: aktPerson === p ? 700 : 400, fontSize: 16, transition: "all .2s",
          }}>
            {AVATARE[p]} {p}
          </button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#166534", margin: "0 0 14px" }}>💚 Mag ich</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16, minHeight: 40 }}>
            {v.mag.map(item => (
              <span key={item} style={{ background: "#dcfce7", color: "#166534", borderRadius: 999, padding: "4px 12px", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                {item} <button onClick={() => removeMag(item)} style={{ background: "none", border: "none", cursor: "pointer", color: "#166534", padding: 0, fontSize: 14, lineHeight: 1 }}>×</button>
              </span>
            ))}
            {v.mag.length === 0 && <span style={{ color: "#86efac", fontSize: 13 }}>Noch nichts eingetragen…</span>}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input ref={magRef} defaultValue="" onKeyDown={e => e.key === "Enter" && addMag()} placeholder="z.B. Pasta, Pizza…" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" style={{ ...inputStyle, flex: 1 }} />
            <button onClick={addMag} style={btnStyle("#16a34a")}>+ Hinzufügen</button>
          </div>
        </div>

        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#991b1b", margin: "0 0 14px" }}>🚫 Mag ich nicht</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16, minHeight: 40 }}>
            {v.magNicht.map(item => (
              <span key={item} style={{ background: "#fee2e2", color: "#991b1b", borderRadius: 999, padding: "4px 12px", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                {item} <button onClick={() => removeMagNicht(item)} style={{ background: "none", border: "none", cursor: "pointer", color: "#991b1b", padding: 0, fontSize: 14, lineHeight: 1 }}>×</button>
              </span>
            ))}
            {v.magNicht.length === 0 && <span style={{ color: "#fca5a5", fontSize: 13 }}>Noch nichts eingetragen…</span>}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input ref={magNichtRef} defaultValue="" onKeyDown={e => e.key === "Enter" && addMagNicht()} placeholder="z.B. Fisch, Scharf…" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" style={{ ...inputStyle, flex: 1 }} />
            <button onClick={addMagNicht} style={btnStyle("#dc2626")}>+ Hinzufügen</button>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 24, background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 12, padding: 20 }}>
        <h3 style={{ margin: "0 0 12px", color: "#1d4ed8" }}>📊 Übersicht aller Vorlieben</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
          {FAMILIE.map(p => {
            const pv = vorlieben[p] || { mag: [], magNicht: [] };
            return (
              <div key={p} style={{ background: "#fff", borderRadius: 8, padding: 12, border: `2px solid ${FARBEN[p]}44` }}>
                <div style={{ fontWeight: 700, marginBottom: 6 }}>{AVATARE[p]} {p}</div>
                <div style={{ fontSize: 12, color: "#16a34a" }}>💚 {pv.mag.join(", ") || "–"}</div>
                <div style={{ fontSize: 12, color: "#dc2626", marginTop: 4 }}>🚫 {pv.magNicht.join(", ") || "–"}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Kalender ──────────────────────────────────────────────────────────────────

function KalenderView({ kalender, setKalender }) {
  const [aktPerson, setAktPerson] = useState("Jette");
  const [weekOffset, setWeekOffset] = useState(1);
  const weekDates = getWeekDates(weekOffset);
  const abwesenheiten = kalender[aktPerson] || [];

  const istAbwesend = (datum, mahlzeit) =>
    abwesenheiten.includes(`${datum}|ganztags`) || abwesenheiten.includes(`${datum}|${mahlzeit}`);

  const toggleMahlzeit = (datum, mahlzeit) => {
    const ganztagsKey = `${datum}|ganztags`;
    const key = `${datum}|${mahlzeit}`;
    let updated;
    if (abwesenheiten.includes(ganztagsKey)) {
      // Ganztags abwesend -> auflösen in Einzelmahlzeiten, außer der angeklickten
      updated = abwesenheiten.filter(k => k !== ganztagsKey);
      MAHLZEITEN.forEach(m => { if (m !== mahlzeit) updated.push(`${datum}|${m}`); });
    } else if (abwesenheiten.includes(key)) {
      updated = abwesenheiten.filter(k => k !== key);
    } else {
      updated = [...abwesenheiten, key];
    }
    const n = { ...kalender, [aktPerson]: updated };
    setKalender(n); save("kalender", n);
  };

  const toggleGanzerTag = (datum) => {
    const ganztagsKey = `${datum}|ganztags`;
    let updated;
    if (abwesenheiten.includes(ganztagsKey)) {
      // Ganztags-Abwesenheit aufheben (inkl. eventueller Einzelmahlzeiten an dem Tag)
      updated = abwesenheiten.filter(k => !k.startsWith(`${datum}|`));
    } else {
      // Alles für diesen Tag entfernen und durch "ganztags" ersetzen
      updated = [...abwesenheiten.filter(k => !k.startsWith(`${datum}|`)), ganztagsKey];
    }
    const n = { ...kalender, [aktPerson]: updated };
    setKalender(n); save("kalender", n);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        {FAMILIE.map(p => (
          <button key={p} onClick={() => setAktPerson(p)} style={{
            background: aktPerson === p ? FARBEN[p] : "#f1f5f9",
            border: `2px solid ${aktPerson === p ? FARBEN[p] : "#e2e8f0"}`,
            borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontWeight: aktPerson === p ? 700 : 400, fontSize: 16,
          }}>
            {AVATARE[p]} {p}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
        <button onClick={() => setWeekOffset(w => w - 1)} style={btnStyle("#334155")}>← Vorherige Woche</button>
        <span style={{ fontWeight: 600, color: "#1e293b" }}>
          KW ab {weekDates[0]} – {weekDates[6]}
          {weekOffset === 1 ? " 📌 Aktuelle Planwoche" : ""}
        </span>
        <button onClick={() => setWeekOffset(w => w + 1)} style={btnStyle("#334155")}>Nächste Woche →</button>
      </div>
      <p style={{ fontSize: 13, color: "#94a3b8", margin: "0 0 16px" }}>
        Klick auf eine Mahlzeit = nur diese Mahlzeit abmelden (z.B. Mittagessen wegen Schule). Klick auf den Tagesnamen = ganzer Tag abwesend.
      </p>

      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 6 }}>
          <thead>
            <tr>
              <th style={{ width: 90 }}></th>
              {WOCHENTAGE.map((tag, i) => {
                const datum = weekDates[i];
                const ganztags = abwesenheiten.includes(`${datum}|ganztags`);
                return (
                  <th key={tag} onClick={() => toggleGanzerTag(datum)} style={{
                    background: ganztags ? "#fee2e2" : "#f8fafc",
                    border: `2px solid ${ganztags ? "#fca5a5" : "transparent"}`,
                    borderRadius: 8, padding: "8px 6px", textAlign: "center", minWidth: 100, cursor: "pointer",
                  }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#1e293b" }}>{tag.slice(0, 2)}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8" }}>{datum}</div>
                    {ganztags && <div style={{ fontSize: 10, color: "#dc2626", fontWeight: 700, marginTop: 2 }}>Ganzer Tag</div>}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {MAHLZEITEN.map(m => (
              <tr key={m}>
                <td style={{ padding: "6px 10px", fontWeight: 600, fontSize: 13, color: MAHLZEIT_META[m].textfarbe, whiteSpace: "nowrap" }}>
                  <div style={{ background: MAHLZEIT_META[m].farbe, borderRadius: 8, padding: "5px 8px", display: "inline-block" }}>
                    {MAHLZEIT_META[m].emoji} {m}
                  </div>
                </td>
                {WOCHENTAGE.map((tag, i) => {
                  const datum = weekDates[i];
                  const ganztags = abwesenheiten.includes(`${datum}|ganztags`);
                  const abw = istAbwesend(datum, m);
                  return (
                    <td key={tag} style={{ textAlign: "center" }}>
                      <div onClick={() => !ganztags && toggleMahlzeit(datum, m)} style={{
                        background: ganztags ? "#fef2f2" : abw ? "#fef2f2" : "#f0fdf4",
                        border: `2px solid ${abw ? "#fca5a5" : "#86efac"}`,
                        borderRadius: 8, padding: "10px 4px", cursor: ganztags ? "default" : "pointer",
                        opacity: ganztags ? 0.5 : 1, transition: "all .2s",
                      }}>
                        <div style={{ fontSize: 18 }}>{abw ? "🔴" : "🟢"}</div>
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ background: "#f8fafc", borderRadius: 12, padding: 20, marginTop: 24 }}>
        <h3 style={{ margin: "0 0 16px", color: "#1e293b" }}>📋 Familienübersicht – diese Woche</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
          {FAMILIE.map(p => {
            const pAbw = kalender[p] || [];
            const einträge = [];
            weekDates.forEach((datum, i) => {
              const tag = WOCHENTAGE[i].slice(0, 2);
              if (pAbw.includes(`${datum}|ganztags`)) { einträge.push(`${tag} (ganzer Tag)`); return; }
              MAHLZEITEN.forEach(m => { if (pAbw.includes(`${datum}|${m}`)) einträge.push(`${tag} ${MAHLZEIT_META[m].emoji}`); });
            });
            return (
              <div key={p} style={{ background: "#fff", borderRadius: 8, padding: 12, border: `2px solid ${FARBEN[p]}44` }}>
                <div style={{ fontWeight: 700, marginBottom: 6 }}>{AVATARE[p]} {p}</div>
                {einträge.length === 0
                  ? <div style={{ fontSize: 12, color: "#16a34a" }}>✅ Immer da!</div>
                  : <div style={{ fontSize: 12, color: "#dc2626" }}>🔴 Abwesend: {einträge.join(", ")}</div>
                }
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Verlauf ───────────────────────────────────────────────────────────────────

function VerlaufView({ verlauf, vorlieben }) {
  const [detail, setDetail] = useState(null);
  if (!verlauf || verlauf.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px", color: "#94a3b8" }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>📊</div>
        <p>Noch keine gespeicherten Wochen.</p>
        <p>Erstelle einen Wochenplan und speichere ihn, um die Lernkurve zu sehen!</p>
      </div>
    );
  }

  // Häufigkeitsanalyse
  const rezeptHäufigkeit = {};
  const kategorieHäufigkeit = {};
  verlauf.forEach(w => {
    Object.values(w.plan || {}).forEach(tag => {
      Object.values(tag || {}).forEach(m => {
        if (m?.name && m.name.length > 3) {
          rezeptHäufigkeit[m.name] = (rezeptHäufigkeit[m.name] || 0) + 1;
          if (m.kategorie) kategorieHäufigkeit[m.kategorie] = (kategorieHäufigkeit[m.kategorie] || 0) + 1;
        }
      });
    });
  });
  const topRezepte = Object.entries(rezeptHäufigkeit).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const topKategorien = Object.entries(kategorieHäufigkeit).sort((a, b) => b[1] - a[1]).slice(0, 5);

  return (
    <div>
      <h2 style={{ color: "#1e293b", marginTop: 0 }}>📊 Was die Familie liebt</h2>
      <p style={{ color: "#64748b" }}>Basierend auf {verlauf.length} gespeicherten Wochen</p>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <div style={{ background: "#eff6ff", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#1d4ed8", margin: "0 0 14px" }}>🏆 Häufigste Gerichte</h3>
          {topRezepte.map(([name, n]) => (
            <div key={name} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #bfdbfe", fontSize: 14 }}>
              <span>{name}</span>
              <span style={{ fontWeight: 700, color: "#1d4ed8" }}>×{n}</span>
            </div>
          ))}
          {topRezepte.length === 0 && <p style={{ color: "#93c5fd" }}>Noch keine Daten.</p>}
        </div>

        <div style={{ background: "#f0fdf4", borderRadius: 12, padding: 20 }}>
          <h3 style={{ color: "#166534", margin: "0 0 14px" }}>🍽️ Beliebteste Kategorien</h3>
          {topKategorien.map(([kat, n]) => (
            <div key={kat} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: "1px solid #bbf7d0", fontSize: 14, alignItems: "center" }}>
              <div style={{ flex: 1 }}>{kat}</div>
              <div style={{ background: "#dcfce7", height: 12, borderRadius: 6, width: `${Math.min(n * 30, 100)}px` }} />
              <span style={{ fontWeight: 700, color: "#166534", minWidth: 24 }}>×{n}</span>
            </div>
          ))}
          {topKategorien.length === 0 && <p style={{ color: "#86efac" }}>Noch keine Daten.</p>}
        </div>
      </div>

      <h3 style={{ color: "#1e293b" }}>🗓️ Gespeicherte Wochen</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {verlauf.map((w, i) => (
          <div key={i} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
            onClick={() => setDetail(detail === i ? null : i)}>
            <div>
              <div style={{ fontWeight: 700 }}>Woche ab {w.woche}</div>
              <div style={{ fontSize: 12, color: "#94a3b8" }}>Gespeichert {new Date(w.datum).toLocaleDateString("de-DE")}</div>
            </div>
            <span style={{ color: "#6366f1" }}>{detail === i ? "▲" : "▼"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Sync ──────────────────────────────────────────────────────────────────────

function SyncView({ config, setConfig, status, alleDaten }) {
  const [code, setCode] = useState(config?.household || "");
  const [cloudBusy, setCloudBusy] = useState(false);

  const cloudUeberschreiben = async () => {
    if (status !== "online") {
      alert("Bitte zuerst mit einem Familien-Code verbinden, dann kannst du die Cloud überschreiben.");
      return;
    }
    if (!confirm("Die Cloud-Daten werden mit den Daten dieses Geräts ÜBERSCHRIEBEN. Daten auf anderen Geräten, die noch nicht synchronisiert wurden, gehen dabei verloren. Fortfahren?")) return;
    setCloudBusy(true);
    try {
      for (const k of DATEN_KEYS) {
        await pushOne(k, alleDaten[k]);
      }
      alert("✓ Cloud erfolgreich mit den lokalen Daten überschrieben. Andere Geräte übernehmen die Daten beim nächsten Verbinden.");
    } catch (e) {
      alert("Fehler beim Überschreiben der Cloud. Bitte Verbindung prüfen und erneut versuchen.");
    } finally {
      setCloudBusy(false);
    }
  };

  const verbinden = () => {
    if (!code.trim()) {
      alert("Bitte einen Familien-Code eingeben.");
      return;
    }
    setConfig({ household: code.trim().toLowerCase() });
  };
  const trennen = () => {
    if (confirm("Synchronisation trennen? Deine Daten bleiben lokal auf diesem Gerät erhalten.")) {
      setConfig(null);
    }
  };

  const statusInfo = {
    offline:    { farbe: "#64748b", bg: "#f1f5f9", text: "Nicht verbunden – Daten nur auf diesem Gerät" },
    connecting: { farbe: "#b45309", bg: "#fef3c7", text: "Verbinde mit der Cloud…" },
    online:     { farbe: "#166534", bg: "#dcfce7", text: "✓ Synchronisiert – alle Geräte sind verbunden" },
    error:      { farbe: "#991b1b", bg: "#fee2e2", text: "Verbindung fehlgeschlagen – bitte Familien-Code prüfen" },
  }[status] || {};

  return (
    <div style={{ maxWidth: 560 }}>
      <h2 style={{ color: "#1e293b", marginTop: 0 }}>🔄 Geräte-Synchronisation</h2>

      {/* Status-Banner */}
      <div style={{ background: statusInfo.bg, color: statusInfo.farbe, borderRadius: 12, padding: "14px 18px", fontWeight: 600, marginBottom: 24, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>{{ offline: "⚪", connecting: "🟡", online: "🟢", error: "🔴" }[status] || "⚪"}</span>
        {statusInfo.text}
      </div>

      {/* Verbindungsformular */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: 24, marginBottom: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#1e293b" }}>Familien-Code eingeben</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Gib auf <strong>jedem Gerät</strong> denselben Familien-Code ein – das verbindet eure Geräte und synchronisiert alle Pläne automatisch.
        </p>

        <div style={{ marginBottom: 18 }}>
          <label style={labelStyle}>Familien-Code</label>
          <input value={code} onChange={e => setCode(e.target.value)} onKeyDown={e => e.key === "Enter" && verbinden()} placeholder="z.B. schoenknecht2026" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" style={inputStyle} />
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={verbinden} style={{ ...btnStyle("#059669"), fontSize: 15, padding: "10px 22px" }}>
            {status === "online" ? "🔄 Verbindung aktualisieren" : "🔗 Verbinden"}
          </button>
          {config && <button onClick={trennen} style={btnStyle("#dc2626")}>Trennen</button>}
        </div>
      </div>

      <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "12px 14px", fontSize: 13, color: "#92400e" }}>
        💡 <strong>Hinweis zur Sicherheit:</strong> Der Familien-Code wirkt wie ein gemeinsames Passwort. Wähle etwas, das nur eure Familie kennt – dann sieht niemand anderes eure Pläne.
        Auf neuen Geräten einfach denselben Code hier eingeben, dann werden eure Pläne automatisch geladen.
      </div>

      {/* Cloud mit lokalen Daten überschreiben */}
      <div style={{ background: "#fff", border: "1px solid #bfdbfe", borderRadius: 12, padding: 24, marginTop: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#1e40af" }}>☁️ Cloud mit diesem Gerät überschreiben</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Lädt die Daten <strong>dieses Geräts</strong> in die Cloud hoch und ersetzt dort die bisherigen Daten.
          Nutze das, wenn in der Cloud noch veraltete Rezepte/Pläne liegen (z.B. falsche Mengen wie „Portion“), die du durch den aktuellen Stand ersetzen möchtest.
          {status !== "online" && <><br /><br />⚠️ Du musst dafür zuerst oben mit deinem Familien-Code <strong>verbinden</strong>.</>}
        </p>
        <button onClick={cloudUeberschreiben} disabled={cloudBusy || status !== "online"} style={{ ...btnStyle("#2563eb"), fontSize: 15, padding: "10px 22px", opacity: (cloudBusy || status !== "online") ? 0.5 : 1, cursor: (cloudBusy || status !== "online") ? "not-allowed" : "pointer" }}>
          {cloudBusy ? "⏳ Lade hoch…" : "☁️ Cloud jetzt überschreiben"}
        </button>
      </div>

      {/* Lokale Daten zurücksetzen */}
      <div style={{ background: "#fff", border: "1px solid #fecaca", borderRadius: 12, padding: 24, marginTop: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#991b1b" }}>🧹 Lokale Daten zurücksetzen</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Löscht alle auf <strong>diesem Gerät</strong> gespeicherten Daten (Rezepte, Pläne, Vorlieben, Verlauf, Einkaufslisten) und lädt die App neu mit den aktuellen Standard-Rezepten.
          Nutze das, wenn Mengen/Einheiten in der Einkaufsliste falsch angezeigt werden (z.B. „Portion“ statt Gramm).
          {config?.household && <><br /><br />⚠️ <strong>Achtung:</strong> Du bist mit einem Familien-Code verbunden. Lösche zuerst die Verbindung („Trennen“), sonst werden die alten Cloud-Daten beim nächsten Verbinden wieder geladen.</>}
        </p>
        <button
          onClick={() => {
            if (confirm("Wirklich ALLE lokalen Daten auf diesem Gerät löschen und die App neu starten? Dies kann nicht rückgängig gemacht werden.")) {
              try { localStorage.clear(); } catch {}
              location.reload();
            }
          }}
          style={{ ...btnStyle("#dc2626"), fontSize: 15, padding: "10px 22px" }}
        >
          🧹 Lokale Daten löschen & neu starten
        </button>
      </div>
    </div>
  );
}

// ── Modal & Utilities ─────────────────────────────────────────────────────────

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#0007", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 28, width: "100%", maxWidth: 560, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 20px 60px #0003" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, fontSize: 18, color: "#1e293b" }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#94a3b8", padding: 4, lineHeight: 1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const btnStyle = (bg) => ({
  background: bg, color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px",
  cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "opacity .2s", fontFamily: "inherit",
});
const inputStyle = { width: "100%", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 12px", fontSize: 14, fontFamily: "inherit", boxSizing: "border-box", outline: "none" };
const labelStyle = { display: "block", fontSize: 13, fontWeight: 600, color: "#475569", marginBottom: 5 };
const linkStyle = { color: "#6366f1", fontWeight: 600 };
const rezeptZeileStyle = { background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14 };

// ─── Haupt-App ────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("wochenplan");
  const [rezepte, setRezepte] = useState(() => migriereRezepte(load("rezepte", STARTER_REZEPTE)));
  const [vorlieben, setVorlieben] = useState(() => load("vorlieben", DEFAULT_VORLIEBEN));
  const [kalender, setKalender] = useState(() => load("kalender", {}));
  const [wochenplan, setWochenplan] = useState(() => load("wochenplan", {}));
  const [verlauf, setVerlauf] = useState(() => load("verlauf", []));

  // Sync-State: nur noch der Familien-Code wird gespeichert (URL/Schlüssel sind fest im Code)
  const [syncConfig, setSyncConfigRaw] = useState(() => {
    const cfg = load("sync_config", null);
    if (!cfg) return null;
    // Abwärtskompatibel: alte Configs hatten {url, key, household}
    return cfg.household ? { household: cfg.household } : null;
  });
  const [syncStatus, setSyncStatus] = useState("offline");
  // Beim ersten Laden mit gespeichertem Familien-Code: zeige Ladeansicht, bis Cloud-Daten da sind
  const [initialSyncPending, setInitialSyncPending] = useState(() => {
    const cfg = load("sync_config", null);
    return !!cfg?.household;
  });

  const setSyncConfig = useCallback((cfg) => {
    if (cfg) { try { localStorage.setItem("sync_config", JSON.stringify(cfg)); } catch {} }
    else { try { localStorage.removeItem("sync_config"); } catch {} }
    setSyncConfigRaw(cfg);
  }, []);

  // Eingehende Remote-Änderungen auf den State anwenden (ohne erneutes Pushen)
  const applyRemote = useCallback((key, value) => {
    // Eigene Echo-Updates kurz nach dem Senden ignorieren (verhindert "Zurückspringen" beim Tippen, v.a. auf Mobilgeräten)
    const seit = Date.now() - (_zuletztGesendet[key] || 0);
    if (seit < 2500) return;
    const setterMap = { rezepte: setRezepte, vorlieben: setVorlieben, kalender: setKalender, wochenplan: setWochenplan, verlauf: setVerlauf };
    const setter = setterMap[key];
    if (setter) {
      const wert = (key === "rezepte") ? migriereRezepte(value) : value;
      setter(wert);
      try { localStorage.setItem(key, JSON.stringify(wert)); } catch {}
    }
  }, []);

  // Sicherheits-Timeout: falls Sync nach 8s nicht reagiert, Ladeansicht trotzdem beenden
  useEffect(() => {
    if (!initialSyncPending) return;
    const t = setTimeout(() => setInitialSyncPending(false), 8000);
    return () => clearTimeout(t);
  }, [initialSyncPending]);

  // Verbinden, wenn Familien-Code vorhanden
  useEffect(() => {
    if (!syncConfig?.household) {
      disconnectSync();
      setSyncStatus("offline");
      setInitialSyncPending(false);
      return;
    }
    let aktiv = true;
    setSyncStatus("connecting");
    const aktuelleDaten = { rezepte, vorlieben, kalender, wochenplan, verlauf };
    const verbindungsDaten = { url: SUPABASE_URL, key: SUPABASE_ANON_KEY, household: syncConfig.household };

    connectSync(verbindungsDaten, applyRemote)
      .then(async () => {
        if (!aktiv) return;
        const remote = await pullAll();
        for (const k of DATEN_KEYS) {
          if (remote && remote[k] !== undefined && remote[k] !== null) {
            applyRemote(k, remote[k]);          // Cloud-Daten übernehmen
          } else {
            await pushOne(k, aktuelleDaten[k]);  // lokale Daten in die Cloud hochladen
          }
        }
        if (aktiv) { setSyncStatus("online"); setInitialSyncPending(false); }
      })
      .catch(() => { if (aktiv) { setSyncStatus("error"); setInitialSyncPending(false); } });

    return () => { aktiv = false; disconnectSync(); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [syncConfig]);

  if (initialSyncPending) {
    return (
      <div style={{ minHeight: "100vh", background: "#e8f4f8", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'Inter', 'Segoe UI', sans-serif" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>🍽️</div>
        <div style={{ fontSize: 16, color: "#475569", fontWeight: 600 }}>Daten werden geladen…</div>
        <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 6 }}>Verbinde mit Cloud-Speicher</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#e8f4f8", fontFamily: "'Inter', 'Segoe UI', sans-serif" }}>
      {/* Header */}
      <div style={{ background: "#1a1a2e" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 24px 0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
            <div style={{ fontSize: 36 }}>🍽️</div>
            <div style={{ flex: 1 }}>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: -0.5 }}>Familienplaner</h1>
              <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 1 }}>
                {FAMILIE.map(p => <span key={p} style={{ marginRight: 8 }}>{AVATARE[p]} {p}</span>)}
              </div>
            </div>
            <button onClick={() => setTab("sync")} title="Sync-Status" style={{
              background: { offline: "#33415588", connecting: "#b4530988", online: "#16653488", error: "#991b1b88" }[syncStatus],
              border: "none", borderRadius: 99, padding: "6px 14px", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
            }}>
              {{ offline: "⚪ Lokal", connecting: "🟡 Verbinde…", online: "🟢 Synchron", error: "🔴 Fehler" }[syncStatus]}
            </button>
          </div>
          <Navigation aktiv={tab} setAktiv={setTab} syncStatus={syncStatus} />
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 24px" }}>
        {tab === "wochenplan" && <WochenplanView wochenplan={wochenplan} setWochenplan={setWochenplan} rezepte={rezepte} vorlieben={vorlieben} kalender={kalender} setKalender={setKalender} verlauf={verlauf} setVerlauf={setVerlauf} />}
        {tab === "rezepte" && <RezepteView rezepte={rezepte} setRezepte={setRezepte} />}
        {tab === "vorlieben" && <VorliebenView vorlieben={vorlieben} setVorlieben={setVorlieben} />}
        {tab === "kalender" && <KalenderView kalender={kalender} setKalender={setKalender} />}
        {tab === "verlauf" && <VerlaufView verlauf={verlauf} vorlieben={vorlieben} />}
        {tab === "sync" && <SyncView config={syncConfig} setConfig={setSyncConfig} status={syncStatus} alleDaten={{ rezepte, vorlieben, kalender, wochenplan, verlauf }} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
