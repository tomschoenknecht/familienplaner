          placeholder="sk-ant-…"
          autoComplete="off" spellCheck="false"
          style={{ ...inputStyle, flex: 1, minWidth: 200, fontFamily: "monospace" }}
        />
        <button onClick={() => setSichtbar(s => !s)} style={btnStyle("#64748b")}>{sichtbar ? "Verbergen" : "Anzeigen"}</button>
        <button onClick={speichern} style={btnStyle("#4338ca")}>Speichern</button>
      </div>
      {gespeichert && <div style={{ color: "#166534", fontSize: 13, marginTop: 8, fontWeight: 600 }}>✓ Schlüssel gespeichert</div>}
      {!getApiKey() && <div style={{ color: "#92400e", fontSize: 13, marginTop: 8 }}>Noch kein Schlüssel hinterlegt.</div>}
    </div>
  );
}

function SyncView({ config, setConfig, status, alleDaten }) {
  const [code, setCode] = useState(config?.household || "");
  const [cloudBusy, setCloudBusy] = useState(false);

  const cloudUeberschreiben = async () => {
    if (status !== "online") {
      alert("Bitte zuerst mit einem Familien-Code verbinden, dann kannst du die Cloud überschreiben.");
      return;
    }
    if (!confirm("Die Cloud-Daten werden mit den Daten dieses Geräts ÜBERSCHRIEBEN. Daten auf anderen Geräten, die noch nicht synchronisiert wurden, gehen dabei verloren. Fortfahren?")) return;
    setCloudBusy(true);
    try {
      for (const k of DATEN_KEYS) {
        await pushOne(k, alleDaten[k]);
      }
      alert("✓ Cloud erfolgreich mit den lokalen Daten überschrieben. Andere Geräte übernehmen die Daten beim nächsten Verbinden.");
    } catch (e) {
      alert("Fehler beim Überschreiben der Cloud. Bitte Verbindung prüfen und erneut versuchen.");
    } finally {
      setCloudBusy(false);
    }
  };

  const verbinden = () => {
    if (!code.trim()) {
      alert("Bitte einen Familien-Code eingeben.");
      return;
    }
    setConfig({ household: code.trim().toLowerCase() });
  };
  const trennen = () => {
    if (confirm("Synchronisation trennen? Deine Daten bleiben lokal auf diesem Gerät erhalten.")) {
      setConfig(null);
    }
  };

  const statusInfo = {
    offline:    { farbe: "#64748b", bg: "#f1f5f9", text: "Nicht verbunden – Daten nur auf diesem Gerät" },
    connecting: { farbe: "#b45309", bg: "#fef3c7", text: "Verbinde mit der Cloud…" },
    online:     { farbe: "#166534", bg: "#dcfce7", text: "✓ Synchronisiert – alle Geräte sind verbunden" },
    error:      { farbe: "#991b1b", bg: "#fee2e2", text: "Verbindung fehlgeschlagen – bitte Familien-Code prüfen" },
  }[status] || {};

  return (
    <div style={{ maxWidth: 560 }}>
      <h2 style={{ color: "#1e293b", marginTop: 0 }}>Geräte-Synchronisation</h2>

      {/* Status-Banner */}
      <div style={{ background: statusInfo.bg, color: statusInfo.farbe, borderRadius: 12, padding: "14px 18px", fontWeight: 600, marginBottom: 24, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>{{ offline: "Lokal", connecting: "Verbinde", online: "Synchron", error: "Fehler" }[status] || "Lokal"}</span>
        {statusInfo.text}
      </div>

      {/* Verbindungsformular */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: 24, marginBottom: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#1e293b" }}>Familien-Code eingeben</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Gib auf <strong>jedem Gerät</strong> denselben Familien-Code ein – das verbindet eure Geräte und synchronisiert alle Pläne automatisch.
        </p>

        <div style={{ marginBottom: 18 }}>
          <label style={labelStyle}>Familien-Code</label>
          <input type="password" value={code} onChange={e => setCode(e.target.value)} onKeyDown={e => e.key === "Enter" && verbinden()} placeholder="z.B. schoenknecht2026" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" style={inputStyle} />
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={verbinden} style={{ ...btnStyle("#059669"), fontSize: 15, padding: "10px 22px" }}>
            {status === "online" ? "Verbindung aktualisieren" : "Verbinden"}
          </button>
          {config && <button onClick={trennen} style={btnStyle("#dc2626")}>Trennen</button>}
        </div>
      </div>

      <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "12px 14px", fontSize: 13, color: "#92400e" }}>
        <strong>Hinweis zur Sicherheit:</strong> Der Familien-Code wirkt wie ein gemeinsames Passwort. Wähle etwas, das nur eure Familie kennt – dann sieht niemand anderes eure Pläne.
        Auf neuen Geräten einfach denselben Code hier eingeben, dann werden eure Pläne automatisch geladen.
      </div>

      {/* KI-Funktionen: API-Schlüssel */}
      <div style={{ background: "#fff", border: "1px solid #c7d2fe", borderRadius: 12, padding: 24, marginTop: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#4338ca" }}>KI-Funktionen (Rezept per Foto)</h3>
        <p style={{ margin: "0 0 14px", fontSize: 14, color: "#64748b" }}>
          Für die Funktion „Rezept per Foto“ wird ein Anthropic-API-Schlüssel benötigt. Er wird <strong>nur lokal auf diesem Gerät</strong> gespeichert und niemals geteilt.
          Einen Schlüssel erhältst du unter <span style={{ color: "#4338ca", fontWeight: 600 }}>console.anthropic.com</span>.
        </p>
        <ApiKeyEingabe />
      </div>

      {/* Cloud mit lokalen Daten überschreiben */}
      <div style={{ background: "#fff", border: "1px solid #bfdbfe", borderRadius: 12, padding: 24, marginTop: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#1e40af" }}>Cloud mit diesem Gerät überschreiben</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Lädt die Daten <strong>dieses Geräts</strong> in die Cloud hoch und ersetzt dort die bisherigen Daten.
          Nutze das, wenn in der Cloud noch veraltete Rezepte/Pläne liegen (z.B. falsche Mengen wie „Portion“), die du durch den aktuellen Stand ersetzen möchtest.
          {status !== "online" && <><br /><br />Du musst dafür zuerst oben mit deinem Familien-Code <strong>verbinden</strong>.</>}
        </p>
        <button onClick={cloudUeberschreiben} disabled={cloudBusy || status !== "online"} style={{ ...btnStyle("#2563eb"), fontSize: 15, padding: "10px 22px", opacity: (cloudBusy || status !== "online") ? 0.5 : 1, cursor: (cloudBusy || status !== "online") ? "not-allowed" : "pointer" }}>
          {cloudBusy ? "Lade hoch…" : "Cloud jetzt überschreiben"}
        </button>
      </div>

      {/* Lokale Daten zurücksetzen */}
      <div style={{ background: "#fff", border: "1px solid #fecaca", borderRadius: 12, padding: 24, marginTop: 20 }}>
        <h3 style={{ margin: "0 0 4px", color: "#991b1b" }}>Lokale Daten zurücksetzen</h3>
        <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b" }}>
          Löscht alle auf <strong>diesem Gerät</strong> gespeicherten Daten (Rezepte, Pläne, Vorlieben, Verlauf, Einkaufslisten) und lädt die App neu mit den aktuellen Standard-Rezepten.
          Nutze das, wenn Mengen/Einheiten in der Einkaufsliste falsch angezeigt werden (z.B. „Portion“ statt Gramm).
          {config?.household && <><br /><br /><strong>Achtung:</strong> Du bist mit einem Familien-Code verbunden. Lösche zuerst die Verbindung („Trennen“), sonst werden die alten Cloud-Daten beim nächsten Verbinden wieder geladen.</>}
        </p>
        <button
          onClick={() => {
            if (confirm("Wirklich ALLE lokalen Daten auf diesem Gerät löschen und die App neu starten? Dies kann nicht rückgängig gemacht werden.")) {
              try { localStorage.clear(); } catch {}
              location.reload();
            }
          }}
          style={{ ...btnStyle("#dc2626"), fontSize: 15, padding: "10px 22px" }}
        >
          Lokale Daten löschen & neu starten
        </button>
      </div>
    </div>
  );
}

// ── Modal & Utilities ─────────────────────────────────────────────────────────

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#0007", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 28, width: "100%", maxWidth: 560, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 20px 60px #0003" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, fontSize: 18, color: "#1e293b" }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#94a3b8", padding: 4, lineHeight: 1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const btnStyle = (bg) => ({
  background: bg, color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px",
  cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "opacity .2s", fontFamily: "inherit",
});
const inputStyle = { width: "100%", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 12px", fontSize: 14, fontFamily: "inherit", boxSizing: "border-box", outline: "none" };
const labelStyle = { display: "block", fontSize: 13, fontWeight: 600, color: "#475569", marginBottom: 5 };
const linkStyle = { color: "#6366f1", fontWeight: 600 };
const rezeptZeileStyle = { background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14 };

// ─── Haupt-App ────────────────────────────────────────────────────────────────

// ── Einrichtungs-Dialog ────────────────────────────────────────────────────────

function EinrichtungsDialog({ onFertig }) {
  const [anzahl, setAnzahl] = useState(4);
  const [namen, setNamen] = useState(["", "", "", ""]);

  const setAnzahlUnd = (n) => {
    setAnzahl(n);
    setNamen(prev => {
      const neu = Array(n).fill("").map((_, i) => prev[i] || "");
      return neu;
    });
  };

  const setName = (i, val) => setNamen(prev => prev.map((n, idx) => idx === i ? val : n));

  const alleAusgefüllt = namen.every(n => n.trim().length > 0);

  const fertig = () => {
    const bereinigt = namen.map(n => n.trim());
    onFertig(bereinigt);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(30,15,5,0.55)", zIndex: 1000,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
    }}>
      <div style={{ background: "#fffcf8", borderRadius: 20, padding: 36, maxWidth: 460, width: "100%", boxShadow: "0 24px 64px rgba(30,15,5,0.25)" }}>
        <h2 style={{ margin: "0 0 6px", color: "#3b2412", fontSize: 24, fontWeight: 800 }}>Willkommen!</h2>
        <p style={{ margin: "0 0 28px", color: "#b08968", fontSize: 15 }}>Richte deinen Familienplaner ein. Du kannst das später jederzeit in den Einstellungen ändern.</p>

        {/* Anzahl */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontWeight: 700, color: "#3b2412", marginBottom: 10, fontSize: 14 }}>Wie viele Personen plant ihr gemeinsam?</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[2, 3, 4, 5, 6, 7, 8].map(n => (
              <button key={n} onClick={() => setAnzahlUnd(n)} style={{
                width: 44, height: 44, borderRadius: 10, border: `2px solid ${anzahl === n ? "#c2410c" : "#e8d4ba"}`,
                background: anzahl === n ? "#c2410c" : "#fff", color: anzahl === n ? "#fff" : "#3b2412",
                fontWeight: 700, fontSize: 16, cursor: "pointer", transition: "all .15s",
              }}>{n}</button>
            ))}
          </div>
        </div>

        {/* Namen */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontWeight: 700, color: "#3b2412", marginBottom: 10, fontSize: 14 }}>Und wie heißt ihr?</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {namen.map((name, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{
                  width: 32, height: 32, borderRadius: "50%", background: AVATAR_FARBPALETTE[i % AVATAR_FARBPALETTE.length],
                  display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, color: "#fff", flexShrink: 0,
                }}>{name.trim() ? name.trim()[0].toUpperCase() : (i + 1)}</span>
                <input
                  value={name}
                  onChange={e => setName(i, e.target.value)}
                  onKeyDown={e => e.key === "Enter" && i < namen.length - 1 && document.querySelectorAll(".einrichtung-input")[i + 1]?.focus()}
                  placeholder={`Person ${i + 1}`}
                  className="einrichtung-input"
                  autoComplete="off" autoCorrect="off" spellCheck="false"
                  style={{ flex: 1, padding: "10px 14px", border: "2px solid #e8d4ba", borderRadius: 10, fontSize: 15, fontFamily: "inherit", outline: "none", color: "#3b2412" }}
                />
              </div>
            ))}
          </div>
        </div>

        <button
          onClick={fertig}
          disabled={!alleAusgefüllt}
          style={{
            width: "100%", padding: "14px", borderRadius: 12, border: "none",
            background: alleAusgefüllt ? "#c2410c" : "#e8d4ba",
            color: alleAusgefüllt ? "#fff" : "#a08060",
            fontWeight: 800, fontSize: 16, cursor: alleAusgefüllt ? "pointer" : "default",
            transition: "all .2s",
          }}>
          Los geht's!
        </button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("wochenplan");
  const [familie, setFamilieRaw] = useState(() => load("familie", null));

  // Modul-Variable FAMILIE synchron halten, damit alle Komponenten darauf zugreifen
  if (familie) FAMILIE = familie;

  const familieEinrichten = (namen) => {
    FAMILIE = namen;
    save("familie", namen);
    setFamilieRaw(namen);
  };

  const [rezepte, setRezepte] = useState(() => migriereRezepte(load("rezepte", STARTER_REZEPTE)));
  const [vorlieben, setVorlieben] = useState(() => load("vorlieben", DEFAULT_VORLIEBEN));
  const [kalender, setKalender] = useState(() => load("kalender", {}));
  const [wochenplan, setWochenplan] = useState(() => load("wochenplan", {}));
  const [verlauf, setVerlauf] = useState(() => load("verlauf", []));
  const [avatarFarben, setAvatarFarbenRaw] = useState(() => load("avatarFarben", {}));
  // avatarFarbenAktuell (Modul-Variable) immer synchron zum State halten, damit Komponenten
  // ohne Prop-Drilling per farbeFuer() darauf zugreifen können.
  avatarFarbenAktuell = avatarFarben;
  const setAvatarFarben = (updater) => {
    setAvatarFarbenRaw(prev => {
      const updated = typeof updater === "function" ? updater(prev) : updater;
      save("avatarFarben", updated);
      return updated;
    });
  };

  // Sync-State: nur noch der Familien-Code wird gespeichert (URL/Schlüssel sind fest im Code)
  const [syncConfig, setSyncConfigRaw] = useState(() => {
    const cfg = load("sync_config", null);
    if (!cfg) return null;
    // Abwärtskompatibel: alte Configs hatten {url, key, household}
    return cfg.household ? { household: cfg.household } : null;
  });
  const [syncStatus, setSyncStatus] = useState("offline");
  // Beim ersten Laden mit gespeichertem Familien-Code: zeige Ladeansicht, bis Cloud-Daten da sind
  const [initialSyncPending, setInitialSyncPending] = useState(() => {
    const cfg = load("sync_config", null);
    return !!cfg?.household;
  });

  const setSyncConfig = useCallback((cfg) => {
    if (cfg) { try { localStorage.setItem("sync_config", JSON.stringify(cfg)); } catch {} }
    else { try { localStorage.removeItem("sync_config"); } catch {} }
    setSyncConfigRaw(cfg);
  }, []);

  // Eingehende Remote-Änderungen auf den State anwenden (ohne erneutes Pushen)
  const applyRemote = useCallback((key, value) => {
    // Eigene Echo-Updates kurz nach dem Senden ignorieren (verhindert "Zurückspringen" beim Tippen, v.a. auf Mobilgeräten)
    const seit = Date.now() - (_zuletztGesendet[key] || 0);
    if (seit < 2500) return;
    const setterMap = { rezepte: setRezepte, vorlieben: setVorlieben, kalender: setKalender, wochenplan: setWochenplan, verlauf: setVerlauf, avatarFarben: setAvatarFarbenRaw, familie: (v) => { FAMILIE = v; setFamilieRaw(v); } };
    const setter = setterMap[key];
    if (setter) {
      const wert = (key === "rezepte") ? migriereRezepte(value) : value;
      setter(wert);
      if (key === "avatarFarben") avatarFarbenAktuell = wert;
      try { localStorage.setItem(key, JSON.stringify(wert)); } catch {}
    }
  }, []);

  // Sicherheits-Timeout: falls Sync nach 8s nicht reagiert, Ladeansicht trotzdem beenden
  useEffect(() => {
    if (!initialSyncPending) return;
    const t = setTimeout(() => setInitialSyncPending(false), 8000);
    return () => clearTimeout(t);
  }, [initialSyncPending]);

  // Verbinden, wenn Familien-Code vorhanden
  useEffect(() => {
    if (!syncConfig?.household) {
      disconnectSync();
      setSyncStatus("offline");
      setInitialSyncPending(false);
      return;
    }
    let aktiv = true;
    setSyncStatus("connecting");
    const aktuelleDaten = { rezepte, vorlieben, kalender, wochenplan, verlauf, avatarFarben };
    const verbindungsDaten = { url: SUPABASE_URL, key: SUPABASE_ANON_KEY, household: syncConfig.household };

    connectSync(verbindungsDaten, applyRemote)
      .then(async () => {
        if (!aktiv) return;
        const remote = await pullAll();
        for (const k of DATEN_KEYS) {
          if (remote && remote[k] !== undefined && remote[k] !== null) {
            const wert = (k === "rezepte") ? migriereRezepte(remote[k]) : remote[k];
            // Wenn Migration neue Rezepte ergänzt hat → zurück in die Cloud pushen
            if (k === "rezepte" && Array.isArray(wert) && wert.length > remote[k].length) {
              applyRemote(k, wert);
              await pushOne(k, wert);
            } else {
              applyRemote(k, remote[k]);
            }
          } else {
            await pushOne(k, aktuelleDaten[k]);  // lokale Daten in die Cloud hochladen
          }
        }
        if (aktiv) { setSyncStatus("online"); setInitialSyncPending(false); }
      })
      .catch(() => { if (aktiv) { setSyncStatus("error"); setInitialSyncPending(false); } });

    return () => { aktiv = false; disconnectSync(); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [syncConfig]);

  if (initialSyncPending) {
    return (
      <div style={{ minHeight: "100vh", background: "#fdf6ee", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'Inter', 'Segoe UI', sans-serif" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", border: "4px solid #f0d9c4", borderTopColor: "#c2410c", animation: "drehen 0.9s linear infinite", marginBottom: 18 }} />
        <style>{"@keyframes drehen { to { transform: rotate(360deg); } }"}</style>
        <div style={{ fontSize: 16, color: "#7c5c42", fontWeight: 600 }}>Daten werden geladen…</div>
        <div style={{ fontSize: 13, color: "#b08968", marginTop: 6 }}>Verbinde mit Cloud-Speicher</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#fdf6ee", fontFamily: "'Inter', 'Segoe UI', sans-serif" }}>
      {!familie && <EinrichtungsDialog onFertig={familieEinrichten} />}
      {/* Header */}
      <div style={{ position: "relative", overflow: "hidden", aspectRatio: "2.4 / 1", minHeight: 320, maxHeight: 520 }}>
        <div style={{
          position: "absolute", inset: 0,
          backgroundImage: `linear-gradient(to top, #fdf6ee 0%, #fdf6eedd 30%, #2e1c0d20 100%), url('${HERO_BILD}')`,
          backgroundSize: "cover", backgroundPosition: "center center",
        }} />
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
          <div style={{ width: "100%", maxWidth: 1200, margin: "0 auto", padding: "32px 24px 0" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 14, marginBottom: 28, minHeight: 96 }}>
              <div>
                <h1 className="header-titel" style={{ margin: 0, fontSize: 30, fontWeight: 800, color: "#3b2412", letterSpacing: -0.6 }}>Familienküche</h1>
                <div className="header-namen" style={{ fontSize: 14, color: "#8a6a4c", marginTop: 4, fontWeight: 600 }}>
                  {FAMILIE.join(" · ")}
                </div>
              </div>
              <button onClick={() => setTab("sync")} title="Sync-Status" style={{
                background: { offline: "#ffffffcc", connecting: "#fef3c7cc", online: "#dcfce7cc", error: "#fee2e2cc" }[syncStatus],
                border: "none", borderRadius: 99, padding: "7px 16px", color: "#3b2412", fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", backdropFilter: "blur(4px)",
              }}>
                {{ offline: "Lokal", connecting: "Verbinde…", online: "Synchron", error: "Fehler" }[syncStatus]}
              </button>
            </div>
            <Navigation aktiv={tab} setAktiv={setTab} syncStatus={syncStatus} />
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="main-content">
        {tab === "wochenplan" && <WochenplanView wochenplan={wochenplan} setWochenplan={setWochenplan} rezepte={rezepte} vorlieben={vorlieben} kalender={kalender} setKalender={setKalender} verlauf={verlauf} setVerlauf={setVerlauf} />}
        {tab === "rezepte" && <RezepteView rezepte={rezepte} setRezepte={setRezepte} />}
        {tab === "vorlieben" && <VorliebenView vorlieben={vorlieben} setVorlieben={setVorlieben} avatarFarben={avatarFarben} setAvatarFarben={setAvatarFarben} />}
        {tab === "kalender" && <KalenderView kalender={kalender} setKalender={setKalender} />}
        {tab === "verlauf" && <VerlaufView verlauf={verlauf} vorlieben={vorlieben} />}
        {tab === "sync" && <SyncView config={syncConfig} setConfig={setSyncConfig} status={syncStatus} alleDaten={{ rezepte, vorlieben, kalender, wochenplan, verlauf, avatarFarben }} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
